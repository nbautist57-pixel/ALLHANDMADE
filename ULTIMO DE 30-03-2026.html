<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllHandMade</title>
<style>
  :root { --bg:#f5f5f5; --radius:8px; --shadow:0 2px 8px rgba(0,0,0,.10); }

  body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:#111; font-size:14px; }
  #loginScreen { display:flex; align-items:center; justify-content:center; height:100vh; background:#111; }

  .login-box .sub { text-align:center; color:#888; font-size:12px; margin-bottom:28px; letter-spacing:1px; text-transform:uppercase; }
  .login-box input { width:100%; padding:11px 14px; border:1.5px solid #ddd; border-radius:6px; font-size:14px; margin-bottom:14px; outline:none; }
  .login-box input:focus { border-color:#111; }
  .login-box button { width:100%; padding:12px; background:#111; color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:700; cursor:pointer; }
  .login-box button:hover { background:#333; }
  .login-error { color:#b00020; font-size:12px; text-align:center; margin-top:8px; display:none; }
  #app { display:none; flex-direction:column; height:100vh; }
  header { background:#111; color:#fff; padding:0 24px; height:54px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  header .brand { font-size:20px; font-weight:800; letter-spacing:3px; }
  header .user-info { display:flex; align-items:center; gap:12px; font-size:13px; }
  header .logout-btn { background:rgba(255,255,255,.15); border:none; color:#fff; padding:6px 14px; border-radius:5px; cursor:pointer; font-size:12px; font-weight:600; }
  nav { background:#fff; border-bottom:2px solid #111; padding:0 24px; display:flex; gap:4px; flex-shrink:0; overflow-x:auto; }
  nav button { padding:14px 18px; border:none; background:none; cursor:pointer; font-size:13px; font-weight:600; color:#666; border-bottom:3px solid transparent; margin-bottom:-2px; white-space:nowrap; }
  nav button:hover { color:#111; }
  nav button.active { color:#111; border-bottom-color:#111; }
  .content { flex:1; overflow-y:auto; padding:24px; }
  .card { background:#fff; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); margin-bottom:20px; border:1px solid #e8e8e8; }
  .card h3 { font-size:13px; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }
  .card .big-num { font-size:30px; font-weight:800; }
  .card .sub-num { font-size:12px; color:#888; margin-top:4px; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:#111; color:#fff; padding:9px 12px; text-align:left; font-size:12px; }
  td { padding:9px 12px; border-bottom:1px solid #eee; vertical-align:middle; }
  tr:hover td { background:#f9f9f9; }
  .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-gray { background:#eee; color:#555; }
  .btn { padding:9px 18px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:700; }
  .btn-primary { background:#111; color:#fff; }
  .btn-primary:hover { background:#333; }
  .btn-secondary { background:#eee; color:#111; border:1.5px solid #ccc; }
  .btn-secondary:hover { background:#ddd; }
  .btn-success { background:#2d7a2d; color:#fff; }
  .btn-success:hover { background:#236023; }
  .btn-danger { background:#b00020; color:#fff; }
  .btn-sm { padding:5px 12px; font-size:12px; }
  .btn-icon { background:none; border:none; cursor:pointer; padding:4px 8px; border-radius:4px; font-size:14px; }
  .btn-icon:hover { background:#eee; }
  .form-row { display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .form-group { flex:1; min-width:140px; }
  .form-group label { display:block; font-size:12px; font-weight:700; color:#555; margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
  .form-group input, .form-group select { width:100%; padding:9px 12px; border:1.5px solid #ddd; border-radius:6px; font-size:13px; outline:none; background:#fff; }

  .modal-overlay.open { display:flex; }
  .modal { background:#fff; border-radius:10px; padding:28px; width:580px; max-width:96vw; max-height:90vh; overflow-y:auto; box-shadow:0 12px 40px rgba(0,0,0,.3); }

  .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid #eee; }
  .bold-box { background:#f5f5f5; border:1.5px solid #ddd; border-radius:8px; padding:14px; margin-top:10px; }
  .bold-box h4 { font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; color:#444; }
  .brow { display:flex; justify-content:space-between; font-size:13px; padding:3px 0; }
  .brow.neto { color:#2d7a2d; font-weight:800; font-size:15px; border-top:1.5px solid #bbb; margin-top:8px; padding-top:8px; }
  .com-box { background:#f0f0f0; border:1.5px solid #ccc; border-radius:8px; padding:12px; margin-top:10px; }
  .com-box h4 { font-size:12px; text-transform:uppercase; letter-spacing:1px; font-weight:800; color:#444; margin-bottom:8px; }
  .crow { display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .crow.dest { font-weight:800; font-size:15px; }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .section-header h2 { font-size:22px; font-weight:800; }
  .module-tag { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:#888; }
  .mod-b { border-left:4px solid #111; }
  .mod-p { border-left:4px solid #555; }
  .mod-a { border-left:4px solid #999; }
  .macro-card { background:#111; color:#fff; border-radius:var(--radius); padding:24px; margin-bottom:20px; }
  .macro-card h3 { color:#aaa; font-size:13px; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .macro-card .big { font-size:36px; font-weight:800; }
  .macro-bd { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .macro-bd .item { background:rgba(255,255,255,.1); border-radius:6px; padding:8px 14px; }
  .macro-bd .item .lbl { color:#aaa; font-size:11px; }
  .macro-bd .item .val { font-weight:700; font-size:14px; }
  .nomina-emp { border:1.5px solid #ddd; border-radius:8px; padding:16px; margin-bottom:14px; }
  .nomina-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
  .nomina-total { display:flex; justify-content:space-between; padding:8px 0; font-size:16px; font-weight:800; border-top:2px solid #111; margin-top:8px; }
  .chip-ok { display:inline-flex; align-items:center; gap:4px; background:#e6f4e6; color:#2d7a2d; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; }
  .chip-warn { display:inline-flex; align-items:center; gap:4px; background:#fff3cd; color:#7a5c00; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; }
  .chip-err { display:inline-flex; align-items:center; gap:4px; background:#fde8ec; color:#b00020; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; }
  .abono-item { display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:#f9f9f9; border-radius:6px; margin-bottom:5px; font-size:13px; }
  .sub-tabs { display:flex; gap:4px; border-bottom:2px solid #eee; margin-bottom:20px; flex-wrap:wrap; }
  .sub-tabs button { padding:8px 16px; border:none; background:none; cursor:pointer; font-size:13px; font-weight:600; color:#888; border-bottom:3px solid transparent; margin-bottom:-2px; }
  .sub-tabs button.active { color:#111; border-bottom-color:#111; }
  .readonly-notice { background:#fff3cd; border:1.5px solid #f0c040; border-radius:8px; padding:12px 16px; margin-bottom:16px; font-size:13px; color:#7a5c00; font-weight:600; }
  @media(max-width:700px){ .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;} .content{padding:14px;} }
</style>
</head>
<body>

    <p class="sub">Sistema de Contabilidad</p>

<div id="app">

<span id="headerUser"></span>

  <div class="content" id="mainContent"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ====== STORE ======
function getStore(){
  const def={
    usuarios:[
      {id:1,user:'admin',pass:'admin123',rol:'admin',nombre:'Administrador',empleadoId:0},
      {id:2,user:'barbero1',pass:'barber1',rol:'barbero',nombre:'Carlos Pérez',empleadoId:1},
      {id:3,user:'barbero2',pass:'barber2',rol:'barbero',nombre:'Juan López',empleadoId:2},
      {id:4,user:'barbero3',pass:'barber3',rol:'barbero',nombre:'Andrés Ruiz',empleadoId:3},
      {id:5,user:'instructor1',pass:'inst1',rol:'instructor',nombre:'Miguel Torres',empleadoId:4}
    ],
    barberos:[
      {id:1,nombre:'Carlos Pérez',pctServicio:40,pctProductos:10,activo:true},
      {id:2,nombre:'Juan López',pctServicio:40,pctProductos:10,activo:true},
      {id:3,nombre:'Andrés Ruiz',pctServicio:40,pctProductos:10,activo:true}
    ],
    instructores:[{id:4,nombre:'Miguel Torres',tipoPago:'porcentaje',pctAcademia:15,valorPorClase:0,activo:true}],
    administradoras:[{id:99,nombre:'Administradora',salarioFijo:1500000}],
    servicios:[
      {id:1,nombre:'Corte clásico',precio:20000},{id:2,nombre:'Corte + barba',precio:30000},
      {id:3,nombre:'Degradado',precio:25000},{id:4,nombre:'Barba',precio:15000},
      {id:5,nombre:'Color/Tinte',precio:45000},{id:6,nombre:'Cejas',precio:10000}
    ],
    productos:[
      {id:1,nombre:'Pomada fijadora',costo:15000,precio:35000,stock:20},
      {id:2,nombre:'Shampoo barba',costo:12000,precio:28000,stock:15},
      {id:3,nombre:'Cera capilar',costo:10000,precio:22000,stock:30},
      {id:4,nombre:'Aceite barba',costo:8000,precio:20000,stock:25}
    ],
    cursos:[
      {id:1,nombre:'Curso básico barbería',precio:350000,clases:8},
      {id:2,nombre:'Curso degradados',precio:250000,clases:6},
      {id:3,nombre:'Masterclass colorimetría',precio:500000,clases:10}
    ],
    ingresosBarberia:[],ingresosProductos:[],ingresosAcademia:[],ingresosNevera:[],gastos:[],pagosNomina:[]
  };
  try{return Object.assign({},def,JSON.parse(localStorage.getItem('ahm_store')||'{}'));}
  catch(e){return def;}
}

// ====== FIREBASE SYNC ======
const _fbCfg={
  apiKey:"AIzaSyA0UbJjXzbQbGcv9dnentmsMkRVR-DXt_8",
  authDomain:"allhandmade-28e91.firebaseapp.com",
  projectId:"allhandmade-28e91",
  storageBucket:"allhandmade-28e91.firebasestorage.app",
  messagingSenderId:"1021216574297",
  appId:"1:1021216574297:web:01371115483c845f8e5a48"
};
let _db=null,_docRef=null,_saveTimer=null;

function _fbInit(){
  if(_db)return true;
  try{
    if(typeof firebase==='undefined')return false;
    if(!firebase.apps.length)firebase.initializeApp(_fbCfg);
    _db=firebase.firestore();
    _docRef=_db.collection('barberia').doc('store');
    return true;
  }catch(e){return false;}
}

function saveStore(st){
  const json=JSON.stringify(st);
  localStorage.setItem('ahm_store',json);
  if(!_fbInit())return;
  if(_saveTimer)clearTimeout(_saveTimer);
  const el=document.getElementById('syncStatus');
  if(el)el.textContent='⏳';
  _saveTimer=setTimeout(()=>{
    _docRef.set({store:json,ts:Date.now()})
      .then(()=>{if(el){el.textContent='☁';setTimeout(()=>el.textContent='',2000);}})
      .catch(()=>{if(el)el.textContent='⚠';});
  },800);
}

async function _fbLoad(){
  if(!_fbInit())return;
  try{
    const snap=await _docRef.get();
    if(snap.exists){
      const data=snap.data().store;
      if(data)localStorage.setItem('ahm_store',data);
    }
  }catch(e){console.warn('Firebase load error:',e);}
}

function _fbListen(){
  if(!_fbInit())return;
  _docRef.onSnapshot(snap=>{
    if(!snap.exists)return;
    const remote=snap.data().store;
    if(remote&&remote!==localStorage.getItem('ahm_store')){
      localStorage.setItem('ahm_store',remote);
      const btn=document.querySelector('nav button.active');
      if(btn){
        const id=btn.id.replace('tab_','');
        ({dashboard:renderDashboard,barberia:renderBarberia,productos:renderProductos,
          academia:renderAcademia,nevera:renderNevera,macro:renderMacro,
          nomina:renderNomina,gastos:renderGastos,anual:renderAnual}[id]||function(){})();
      }
    }
  });
}

// ====== AUTH ======
let currentUser=null;
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;
  const btn=document.querySelector('#loginScreen button');
  btn.textContent='Conectando...';btn.disabled=true;
  await _fbLoad(); // carga datos frescos desde Firebase
  btn.textContent='Ingresar';btn.disabled=false;
  const st=getStore(),found=st.usuarios.find(x=>x.user===u&&x.pass===p);
  if(!found){document.getElementById('loginError').style.display='block';return;}
  currentUser=found;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('headerUser').textContent=found.nombre+' ('+found.rol+')';
  buildNav();showTab('dashboard');
  _fbListen(); // escucha cambios de otros dispositivos en tiempo real
}
function doLogout(){currentUser=null;document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')doLogin();});

// ====== NAV ======
function buildNav(){
  const tabs=currentUser.rol==='admin'?[
    {id:'dashboard',label:'📊 Dashboard'},{id:'barberia',label:'✂ Barbería'},{id:'productos',label:'🛍 Productos'},
    {id:'academia',label:'🎓 Academia'},{id:'nevera',label:'🧊 Nevera'},{id:'macro',label:'📈 Macro'},{id:'nomina',label:'💰 Nómina'},
    {id:'gastos',label:'📋 Gastos'},{id:'anual',label:'📅 2026'},{id:'config',label:'⚙ Config'}
  ]:currentUser.rol==='barbero'?[
    {id:'dashboard',label:'📊 Mi Resumen'},{id:'barberia',label:'✂ Mis Servicios'},{id:'productos',label:'🛍 Mis Ventas'}
  ]:[{id:'dashboard',label:'📊 Mi Resumen'},{id:'academia',label:'🎓 Mi Academia'}];
  document.getElementById('mainNav').innerHTML=tabs.map(t=>`<button onclick="showTab('${t.id}')" id="tab_${t.id}">${t.label}</button>`).join('');
}
function showTab(id){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tab_'+id);if(btn)btn.classList.add('active');
  document.getElementById('mainContent').innerHTML='';
  ({dashboard:renderDashboard,barberia:renderBarberia,productos:renderProductos,academia:renderAcademia,nevera:renderNevera,macro:renderMacro,nomina:renderNomina,gastos:renderGastos,anual:renderAnual,config:renderConfig}[id]||renderDashboard)();
}

// ====== UTILS ======
const fmt=n=>'$'+Math.round(n||0).toLocaleString('es-CO');
const today=()=>new Date().toISOString().slice(0,10);
const mesActual=()=>new Date().toISOString().slice(0,7);
// Retorna solo barberos que son personas (excluye entradas de configuración como Barberia/Nevera)
const barberosPers=st=>st.barberos.filter(b=>!['barberia','nevera'].includes((b.nombre||'').toLowerCase().trim()));
function calcBold(monto,tipo){
  const t={nacional_debito:{pct:.0219,fijo:300},nacional_otras:{pct:.0329,fijo:300},nacional_credito:{pct:.0369,fijo:300},internacional:{pct:.0429,fijo:300}}[tipo]||{pct:.0329,fijo:300};
  const comBold=Math.round(monto*t.pct+t.fijo),reteICA=Math.round(monto*.00414);
  return{comBold,reteICA,neto:monto-comBold-reteICA,pct:t.pct};
}

// ====== DASHBOARD ======
const MESES_NOM=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_SHORT=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const ALL_MESES=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];

// Mes compartido para todos los módulos
let modMes=mesActual();
function setModMes(m,fn){modMes=m;if(typeof fn==='function')fn();else if(typeof fn==='string')window[fn]&&window[fn]();}

// Genera el HTML del selector de mes y llama fn al cambiar
function mesPickerHTML(fn){
  const idx=ALL_MESES.indexOf(modMes);
  const nom=MESES_NOM[idx]+' 2026';
  const esHoy=modMes===mesActual();
  const pills=ALL_MESES.map((m,i)=>{
    const act=m===modMes,hoy=m===mesActual();
    return`<button onclick="setModMes('${m}',${fn})" style="padding:4px 10px;border:1.5px solid ${act?'#111':'#ddd'};border-radius:20px;background:${act?'#111':'#fff'};color:${act?'#fff':'#555'};font-size:12px;font-weight:${act?'800':'500'};cursor:pointer;position:relative;white-space:nowrap">${MESES_SHORT[i]}${hoy&&!act?'<span style="position:absolute;top:0;right:0;width:7px;height:7px;background:#b00020;border-radius:50%;transform:translate(3px,-3px)"></span>':''}</button>`;
  }).join('');
  return`<div style="background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:12px 16px;margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="setModMes(ALL_MESES[${idx}-1],${fn})" ${idx===0?'disabled':''} style="width:30px;height:30px;border:1.5px solid #ddd;border-radius:6px;background:#fff;font-size:16px;cursor:pointer;${idx===0?'opacity:.3':''}">‹</button>
        <span style="font-size:18px;font-weight:800">${nom}</span>
        ${esHoy?'<span style="font-size:11px;font-weight:700;background:#111;color:#fff;border-radius:4px;padding:2px 8px">Mes actual</span>':''}
        <button onclick="setModMes(ALL_MESES[${idx}+1],${fn})" ${idx===11?'disabled':''} style="width:30px;height:30px;border:1.5px solid #ddd;border-radius:6px;background:#fff;font-size:16px;cursor:pointer;${idx===11?'opacity:.3':''}">›</button>
      </div>
      ${!esHoy?`<button onclick="setModMes('${mesActual()}',${fn})" style="padding:5px 12px;border:1.5px solid #111;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:#fff">↩ Mes actual</button>`:''}
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">${pills}</div>
  </div>`;
}
function renderDashboard(){if(currentUser.rol!=='admin'){renderMiResumen();return;}if(!modMes.startsWith('2026-'))modMes=mesActual();_pintarDash(modMes);}
function navMes(dir){const all=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];const idx=all.indexOf(modMes)+dir;if(idx<0||idx>11)return;modMes=all[idx];_pintarDash(modMes);}
function irMes(m){modMes=m;_pintarDash(m);}
function normMetodo(m){if(!m||m==='undefined')return 'Sin registrar';const ml=m.toLowerCase();if(ml.includes('efectivo'))return 'Efectivo';if(ml.includes('nequi'))return 'Nequi';if(ml.includes('daviplata'))return 'Daviplata';if(ml.includes('transferencia')||ml.includes('tarjeta')||ml.includes('bold'))return 'Bold / Tarjeta';return m;}
function _pintarDash(mes){
  const st=getStore();

  const movsTodos=[...ibM.map(x=>({fecha:x.fecha,tipo:'Barbería',desc:x.descripcion,met:x.metodoPago,monto:x.monto})),...ipM.map(x=>({fecha:x.fecha,tipo:'Producto',desc:x.descripcion,met:x.metodoPago,monto:x.monto})),...iaM.map(x=>({fecha:x.fecha,tipo:'Academia',desc:x.descripcion,met:(x.abonos&&x.abonos.length?x.abonos[x.abonos.length-1].metodoPago:'—'),monto:x.totalPagado||0}))].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,8);

  else html+='<tr><td colspan="5" style="text-align:center;color:#aaa;padding:12px">Sin movimientos</td></tr>';

  document.getElementById('mainContent').innerHTML=html;
}

function selTodosB(checked){
  document.querySelectorAll('.chk_b').forEach(c=>c.checked=checked);
  updSelCountB();
}
function updSelCountB(){
  const sel=document.querySelectorAll('.chk_b:checked');
  const btn=document.getElementById('btn_del_sel_b');
  const cnt=document.getElementById('sel_count_b');
  if(btn) btn.style.display=sel.length?'':'none';
  if(cnt) cnt.textContent=sel.length?sel.length+' seleccionado'+(sel.length!==1?'s':''):'';
  // highlight rows
  document.querySelectorAll('.chk_b').forEach(c=>{
    const row=document.getElementById('row_b_'+c.dataset.id);
    if(row) row.style.background=c.checked?'#fff8e1':'';
  });
}
function eliminarSelB(){
  const sel=[...document.querySelectorAll('.chk_b:checked')].map(c=>c.dataset.id);
  if(!sel.length)return;
  if(!confirm('¿Eliminar '+sel.length+' cobro'+(sel.length!==1?'s':'')+' seleccionado'+(sel.length!==1?'s':''+'?')))return;
  const st=getStore();
  st.ingresosBarberia=st.ingresosBarberia.filter(x=>!sel.includes(String(x.id)));
  saveStore(st);renderBarberia();
}
function eliminarTodosB(){
  const st=getStore();
  // Respeta los filtros activos — solo borra lo que está visible
  let ids=st.ingresosBarberia;
  if(fBarb.fechaD)ids=ids.filter(x=>x.fecha>=fBarb.fechaD);
  if(fBarb.fechaH)ids=ids.filter(x=>x.fecha<=fBarb.fechaH);
  if(fBarb.barbero)ids=ids.filter(x=>x.barberoId==fBarb.barbero);
  if(fBarb.metodo)ids=ids.filter(x=>normMetodo(x.metodoPago)===fBarb.metodo);
  const n=ids.length;
  if(!n){alert('No hay registros para eliminar.');return;}
  const hayFiltro=fBarb.fechaD||fBarb.fechaH||fBarb.barbero||fBarb.metodo;
  const msg=hayFiltro?'¿Eliminar los '+n+' cobros del filtro actual?':'¿Eliminar TODOS los '+n+' cobros de barbería?\n\nEsta acción no se puede deshacer.';
  if(!confirm(msg))return;
  const idsSet=new Set(ids.map(x=>x.id));
  st.ingresosBarberia=st.ingresosBarberia.filter(x=>!idsSet.has(x.id));
  saveStore(st);renderBarberia();
}

  if(!x)return;
  showModal(`<h2>✏️ Editar Cobro — Barbería</h2>
  <div class="form-row">
    <div class="form-group"><label>Fecha</label><input type="date" id="eb_f" value="${x.fecha}"></div>

function autoEditPB(){
  const s=document.getElementById('eb_s');
  const p=s.options[s.selectedIndex].dataset.p;
  if(p&&parseInt(p)>0) document.getElementById('eb_m').value=p;
  updEditB();
}

function updEditB(){
  const monto=parseInt(document.getElementById('eb_m')?.value||0);
  const pago=document.getElementById('eb_p')?.value||'';
  const bId=document.getElementById('eb_b')?.value;
  const st=getStore(),b=st.barberos.find(x=>x.id==bId);
  // selector % si hay pctServicio2
  const wrap=document.getElementById('eb_pct2_wrap'),sel2=document.getElementById('eb_pct2');
  if(wrap&&sel2&&b){
    if(b.pctServicio2>0){wrap.style.display='';sel2.innerHTML=`<option value="${b.pctServicio}">% A — ${b.pctServicio}%</option><option value="${b.pctServicio2}">% B — ${b.pctServicio2}%</option>`;}
    else wrap.style.display='none';
  }
  const pct=sel2&&b?.pctServicio2>0?parseInt(sel2.value||b.pctServicio):b?.pctServicio||40;
  const div=document.getElementById('eb_desglose');if(!div)return;
  let neto=monto,descuentoBold=0;
  let boldHTML='';
  if(pago.startsWith('Bold_')){
    const r=calcBold(monto,pago.replace('Bold_',''));
    neto=r.neto;descuentoBold=r.comBold+r.reteICA;
    boldHTML=`<div class="bold-box"><h4>💳 Desglose Bold</h4>
      <div class="brow"><span>Cobrado</span><span>${fmt(monto)}</span></div>
      <div class="brow"><span>Bold (${(r.pct*100).toFixed(2)}%+$300)</span><span style="color:#b00020">-${fmt(r.comBold)}</span></div>
      <div class="brow"><span>ReteICA</span><span style="color:#b00020">-${fmt(r.reteICA)}</span></div>
      <div class="brow neto"><span>Neto</span><span>${fmt(neto)}</span></div></div>`;
  }
  const com=Math.round(neto*pct/100);
  div.innerHTML=boldHTML+(monto?`<div class="com-box" style="margin-top:8px"><h4>Comisión</h4>
    <div class="crow"><span>Neto ${fmt(neto)} × ${pct}%</span></div>
    <div class="crow dest"><span>→ ${b?.nombre||''}</span><span>${fmt(com)}</span></div>
    <div class="crow"><span>→ Barbería</span><span>${fmt(neto-com)}</span></div></div>`:'');
}

function guardarEdicionB(id){
  const st=getStore();
  const idx=st.ingresosBarberia.findIndex(x=>x.id==id);
  if(idx<0)return;
  const fecha=document.getElementById('eb_f').value;
  const barberoId=parseInt(document.getElementById('eb_b').value);
  const sSel=document.getElementById('eb_s');
  const descripcion=sSel.options[sSel.selectedIndex].value==='0'
    ? st.ingresosBarberia[idx].descripcion
    : sSel.options[sSel.selectedIndex].text.split(' — ')[0];
  const monto=parseInt(document.getElementById('eb_m').value||0);
  const pago=document.getElementById('eb_p').value;
  if(!fecha||!monto){alert('Completa los campos requeridos');return;}
  const b=st.barberos.find(x=>x.id==barberoId);
  const sel2=document.getElementById('eb_pct2');
  const pct=sel2&&b?.pctServicio2>0?parseInt(sel2.value||b.pctServicio):b?.pctServicio||40;
  let neto=monto,descuentoBold=0,metodoPago=pago;
  if(pago.startsWith('Bold_')){const r=calcBold(monto,pago.replace('Bold_',''));neto=r.neto;descuentoBold=r.comBold+r.reteICA;metodoPago='Tarjeta '+pago.replace('Bold_','');}
  const comisionBarbero=Math.round(neto*pct/100);
  st.ingresosBarberia[idx]={...st.ingresosBarberia[idx],fecha,barberoId,descripcion,monto,neto,descuentoBold,metodoPago,comisionBarbero,pctAplicado:pct};
  saveStore(st);closeModal();renderBarberia();
}

function autoPB(){const s=document.getElementById('mb_s');document.getElementById('mb_p').value=s.options[s.selectedIndex].dataset.p;updB();}
function updB(){
  const m=parseInt(document.getElementById('mb_p')?.value||0),pago=document.getElementById('mb_m')?.value||'',bId=document.getElementById('mb_b')?.value;
  const st=getStore(),b=st.barberos.find(x=>x.id==bId);
  // mostrar selector de % si hay pctServicio2
  const wrap=document.getElementById('mb_pct2_wrap'),sel2=document.getElementById('mb_pct2');
  if(wrap&&sel2&&b){
    if(b.pctServicio2>0){wrap.style.display='';sel2.innerHTML=`<option value="${b.pctServicio}">% A — ${b.pctServicio}%</option><option value="${b.pctServicio2}">% B — ${b.pctServicio2}%</option>`;}
    else{wrap.style.display='none';}
  }
  const pctUsar=sel2&&b?.pctServicio2>0?parseInt(sel2.value||b.pctServicio):b?.pctServicio||40;
  const bd=document.getElementById('bdB'),cd=document.getElementById('cdB');if(!bd||!cd)return;
  let neto=m;
  if(pago.startsWith('Bold_')){const r=calcBold(m,pago.replace('Bold_',''));neto=r.neto;bd.innerHTML=`<div class="bold-box"><h4>💳 Desglose Bold</h4><div class="brow"><span>Cobrado</span><span>${fmt(m)}</span></div><div class="brow"><span>Bold (${(r.pct*100).toFixed(2)}%+$300)</span><span style="color:#b00020">-${fmt(r.comBold)}</span></div><div class="brow"><span>ReteICA (0.414%)</span><span style="color:#b00020">-${fmt(r.reteICA)}</span></div><div class="brow neto"><span>Neto</span><span>${fmt(r.neto)}</span></div></div>`;}else bd.innerHTML='';
  const com=Math.round(neto*pctUsar/100);
  cd.innerHTML=m?`<div class="com-box"><h4>Comisión barbero</h4><div class="crow"><span>Neto ${fmt(neto)} × ${pctUsar}%</span></div><div class="crow dest"><span>→ ${b?.nombre||''}</span><span>${fmt(com)}</span></div><div class="crow"><span>→ Barbería</span><span>${fmt(neto-com)}</span></div></div>`:'';

function guardarBarberia(){
  const st=getStore();
  const fecha=document.getElementById('mb_f').value,barberoId=parseInt(document.getElementById('mb_b').value);
  const sS=document.getElementById('mb_s'),servId=parseInt(sS.value),monto=parseInt(document.getElementById('mb_p').value||0),pago=document.getElementById('mb_m').value;
  if(!fecha||!monto){alert('Completa los campos');return;}
  const b=st.barberos.find(x=>x.id==barberoId),serv=st.servicios.find(x=>x.id==servId);
  const sel2=document.getElementById('mb_pct2');
  const pctUsar=sel2&&b?.pctServicio2>0?parseInt(sel2.value||b.pctServicio):b?.pctServicio||40;
  let neto=monto,descuentoBold=0,metodoPago=pago;
  if(pago.startsWith('Bold_')){const r=calcBold(monto,pago.replace('Bold_',''));neto=r.neto;descuentoBold=r.comBold+r.reteICA;metodoPago='Tarjeta '+pago.replace('Bold_','');}
  const comisionBarbero=Math.round(neto*pctUsar/100);
  st.ingresosBarberia.push({id:Date.now(),fecha,barberoId,descripcion:serv?.nombre||'Servicio',monto,neto,descuentoBold,metodoPago,comisionBarbero,pctAplicado:pctUsar});
  saveStore(st);closeModal();renderBarberia();
}

function selTodosP(checked){
  document.querySelectorAll('.chk_p').forEach(c=>c.checked=checked);
  updSelCountP();
}
function updSelCountP(){
  const sel=document.querySelectorAll('.chk_p:checked');
  const btn=document.getElementById('btn_del_sel_p');
  const cnt=document.getElementById('sel_count_p');

function guardarEdicionP(id){

  const pago=document.getElementById('ep_m').value;
  if(!fecha||!monto){alert('Completa los campos requeridos');return;}
  const b=bId==='0'?null:st.barberos.find(x=>x.id==barberoId);

function openPagoN(empId,tipo,nombre,saldo){
  showModal(`<h2>💰 Pagar Nómina — ${nombre}</h2>
  <p style="color:#555;margin-bottom:16px">Saldo pendiente: <b style="color:#b00020;font-size:16px">${fmt(saldo)}</b></p>

    <div class="form-group"><label>Fecha</label><input type="date" id="pn_f" value="${today()}"></div>
    <div class="form-group"><label>Valor a pagar</label><input type="number" id="pn_m" value="${saldo}"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Método</label><select id="pn_p"><option value="Efectivo">💵 Efectivo</option><option value="Bold / Tarjeta">💳 Bold / Tarjeta</option><option value="Nequi">📱 Nequi</option><option value="Daviplata">📱 Daviplata</option></select></div>
    <div class="form-group"><label>Nota (opcional)</label><input type="text" id="pn_n" placeholder="Ej: quincena, adelanto..."></div>
  </div>
  <p style="font-size:12px;color:#888;margin-top:-4px">⚠ Este pago se registrará automáticamente como gasto en la barbería.</p>
  <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-success" onclick="guardarPagoN(${empId},'${tipo}','${nombre.replace(/'/g,"\\'")}')">Registrar pago</button></div>`);
}
function guardarPagoN(empId,tipo,nombre){
  const fecha=document.getElementById('pn_f').value,monto=parseInt(document.getElementById('pn_m').value||0),metodoPago=document.getElementById('pn_p').value,nota=document.getElementById('pn_n').value;
  if(!monto){alert('Ingresa el valor');return;}
  const st=getStore(),mes=fecha.slice(0,7);
  st.pagosNomina.push({id:Date.now(),fecha,mes,empleadoId:empId,tipo,nombre,monto,metodoPago,nota});
  saveStore(st);closeModal();renderNomina();
}

function editarPagoN(pagoId){
  const st=getStore(),p=st.pagosNomina.find(x=>x.id==pagoId);
  if(!p)return;
  showModal(`<h2>✏️ Editar Pago — ${p.nombre}</h2>
  <div class="form-row">
    <div class="form-group"><label>Fecha</label><input type="date" id="ep_f" value="${p.fecha}"></div>
    <div class="form-group"><label>Valor</label><input type="number" id="ep_m" value="${p.monto}"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Método</label>
      <select id="ep_p">
        <option ${p.metodoPago==='Efectivo'?'selected':''} value="Efectivo">💵 Efectivo</option>
        <option ${p.metodoPago==='Bold / Tarjeta'?'selected':''} value="Bold / Tarjeta">💳 Bold / Tarjeta</option>
        <option ${p.metodoPago==='Nequi'?'selected':''} value="Nequi">📱 Nequi</option>
        <option ${p.metodoPago==='Daviplata'?'selected':''} value="Daviplata">📱 Daviplata</option>
      </select>
    </div>
    <div class="form-group"><label>Nota (opcional)</label><input type="text" id="ep_n" value="${p.nota||''}" placeholder="Ej: quincena, adelanto..."></div>
  </div>
  <p style="font-size:12px;color:#888;margin-top:-4px">⚠ El gasto asociado en la barbería también se actualizará.</p>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="guardarEdicionPagoN(${pagoId})">Guardar cambios</button>
  </div>`);
}

function guardarEdicionPagoN(pagoId){
  const fecha=document.getElementById('ep_f').value,monto=parseInt(document.getElementById('ep_m').value||0),metodoPago=document.getElementById('ep_p').value,nota=document.getElementById('ep_n').value;
  if(!monto){alert('Ingresa el valor');return;}
  const st=getStore();
  const idx=st.pagosNomina.findIndex(x=>x.id==pagoId);
  if(idx<0)return;
  const p=st.pagosNomina[idx];
  st.pagosNomina[idx]={...p,fecha,mes:fecha.slice(0,7),monto,metodoPago,nota};
  saveStore(st);closeModal();renderNomina();
}

function eliminarPagoN(pagoId){
  if(!confirm('¿Eliminar este pago?'))return;
  const st=getStore();
  st.pagosNomina=st.pagosNomina.filter(x=>x.id!=pagoId);
  saveStore(st);renderNomina();
}

// ====== GASTOS ======
function renderGastos(){
  const st=getStore(),mes=modMes;
  const lista=st.gastos.filter(x=>x.fecha.startsWith(mes)).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const total=lista.reduce((a,x)=>a+x.monto,0);

  // Calcular descuentos Bold del mes (salen directo de los ingresos, no son gastos manuales)
  const ibM=st.ingresosBarberia.filter(x=>x.fecha.startsWith(mes));
  const ipM=st.ingresosProductos.filter(x=>x.fecha.startsWith(mes));
  const inM=(st.ingresosNevera||[]).filter(x=>x.fecha.startsWith(mes));
  const boldBarb=ibM.reduce((a,x)=>a+(x.descuentoBold||0),0);
  const boldProd=ipM.reduce((a,x)=>a+(x.descuentoBold||0),0);
  const boldNev=inM.reduce((a,x)=>a+(x.descuentoBold||0),0);
  const totalBold=boldBarb+boldProd+boldNev;

  // Totales por categoría
  const porCat={};
  lista.forEach(x=>{porCat[x.categoria]=(porCat[x.categoria]||0)+x.monto;});

function guardarGasto(){
  const st=getStore();
  const fecha=document.getElementById('mg_f').value;
  const categoria=document.getElementById('mg_c').value;
  const descripcion=document.getElementById('mg_d').value;
  const monto=parseInt(document.getElementById('mg_m').value||0);
  const metodoGasto=document.getElementById('mg_bolsillo').value;
  if(!fecha||!monto){alert('Completa los campos');return;}
  st.gastos.push({id:Date.now(),fecha,categoria,descripcion,monto,metodoGasto});
  saveStore(st);closeModal();renderGastos();
}
function delGasto(id){if(!confirm('¿Eliminar?'))return;const st=getStore();st.gastos=st.gastos.filter(x=>x.id!=id);saveStore(st);renderGastos();}
function editarGasto(id){
  const st=getStore(),g=st.gastos.find(x=>x.id==id);if(!g)return;
  showModal(`<h2>✏️ Editar Gasto</h2>
  <div class="form-row">

    </div>
  </div>

    <div class="form-group" style="flex:2"><label>Descripción</label><input type="text" id="eg_d" value="${g.descripcion||''}"></div>

  </div>

    <div class="form-group">

        <option value="Nequi" ${g.metodoGasto==='Nequi'?'selected':''}>📱 Nequi</option>
        <option value="Daviplata" ${g.metodoGasto==='Daviplata'?'selected':''}>📱 Daviplata</option>
        <option value="Bold / Tarjeta" ${g.metodoGasto==='Bold / Tarjeta'?'selected':''}>💳 Bold / Tarjeta</option>

  </div>`);
}
function guardarEdicionGasto(id){
  const st=getStore();
  const idx=st.gastos.findIndex(x=>x.id==id);if(idx<0)return;
  const fecha=document.getElementById('eg_f').value;
  const categoria=document.getElementById('eg_c').value;
  const descripcion=document.getElementById('eg_d').value;
  const monto=parseInt(document.getElementById('eg_m').value||0);
  const metodoGasto=document.getElementById('eg_b').value;
  if(!fecha||!monto){alert('Completa los campos');return;}
  st.gastos[idx]={...st.gastos[idx],fecha,categoria,descripcion,monto,metodoGasto};
  saveStore(st);closeModal();renderGastos();
}
function deleteReg(tipo,id){
  if(!confirm('¿Eliminar?'))return;const st=getStore();
  if(tipo==='barberia')st.ingresosBarberia=st.ingresosBarberia.filter(x=>x.id!=id);
  if(tipo==='productos')st.ingresosProductos=st.ingresosProductos.filter(x=>x.id!=id);
  if(tipo==='academia')st.ingresosAcademia=st.ingresosAcademia.filter(x=>x.id!=id);
  if(tipo==='nevera'){if(!st.ingresosNevera)st.ingresosNevera=[];st.ingresosNevera=st.ingresosNevera.filter(x=>x.id!=id);}
  saveStore(st);({barberia:renderBarberia,productos:renderProductos,academia:renderAcademia,nevera:renderNevera}[tipo]||renderDashboard)();
}

    <p style="font-size:12px;color:#888;margin-bottom:8px">Borra todos los cobros, ventas, inscripciones, gastos y pagos de nómina. Conserva barberos, servicios, productos, cursos y usuarios.</p>
    <button class="btn btn-danger btn-sm" onclick="resetOperativo()">🔄 Reiniciar a cero (conservar configuración)</button>
  </div>
  <div style="border-top:1px solid #eee;padding-top:12px">
    <b style="display:block;margin-bottom:4px;color:#b00020">Borrar TODO</b>
    <p style="font-size:12px;color:#888;margin-bottom:8px">Elimina absolutamente todos los datos incluyendo configuración.</p>
    <button class="btn btn-danger btn-sm" onclick="borrar()">🗑 Borrar todos los datos</button>
  </div>
</div></div>`;}

function resetOperativo(){
  if(!confirm('¿Reiniciar datos operativos a cero?\n\nSe borrarán:\n• Cobros de barbería\n• Ventas de productos\n• Inscripciones academia\n• Gastos\n• Pagos de nómina\n\nSe conservará:\n• Barberos, servicios, productos, cursos, usuarios\n\n¡Esta acción no se puede deshacer!'))return;
  const st=getStore();
  st.ingresosBarberia=[];
  st.ingresosProductos=[];
  st.ingresosAcademia=[];
  st.ingresosNevera=[];
  st.gastos=[];
  st.pagosNomina=[];
  saveStore(st);
  alert('✅ Datos operativos reiniciados. La configuración se conservó.');
  showTab('dashboard');
}
function exportar(){const st=getStore();const b=new Blob([JSON.stringify(st,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='allhandmade_'+today()+'.json';a.click();}
function importar(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(confirm('¿Importar? Reemplaza los datos actuales.')){saveStore(d);alert('✅ Importado');showTab('dashboard');}}catch{alert('Archivo inválido');}};r.readAsText(f);}
function borrar(){if(!confirm('¿BORRAR TODO?'))return;localStorage.removeItem('ahm_store');alert('Borrado');showTab('dashboard');}

// ====== MODAL ======
function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
