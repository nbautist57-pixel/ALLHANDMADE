function cUsers(){const st=getStore();document.getElementById('cfgBody').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3>Usuarios y Contraseñas</h3><button class="btn btn-primary btn-sm" onclick="addUsr()">+ Agregar</button></div><table><thead><tr><th>Nombre</th><th>Usuario</th><th>Contraseña</th><th>Rol</th><th></th></tr></thead><tbody>${st.usuarios.map(u=>`<tr><td>${inp('unm_'+u.id,u.nombre,'width:100%')}</td><td>${inp('uus_'+u.id,u.user,'width:100%')}</td><td>${inp('ups_'+u.id,u.pass,'width:100px')}</td><td><select id="url_${u.id}" style="border:1px solid #ddd;padding:6px;border-radius:4px"><option ${u.rol==='admin'||currentUser.rol==='dueno'||currentUser.rol==='dueno'?'selected':''}>admin</option><option ${u.rol==='barbero'?'selected':''}>barbero</option><option ${u.rol==='instructor'?'selected':''}>instructor</option><option ${u.rol==='administradora'?'selected':''}>administradora</option></select></td><td><button class="btn-icon" onclick="delUsr(${u.id})">🗑</button></td></tr>`).join('')}</tbody></table><div style="margin-top:14px;text-align:right"><button class="btn btn-primary" onclick="saveUsr()">Guardar</button></div></div>`;}
function addUsr(){const st=getStore();st.usuarios.push({id:Date.now(),nombre:'Nuevo usuario',user:'nuevo',pass:'1234',rol:'barbero',empleadoId:0});saveStore(st);cUsers();}
function delUsr(id){if(id==currentUser.id){alert('No puedes eliminarte');return;}if(!confirm('¿Eliminar?'))return;const st=getStore();st.usuarios=st.usuarios.filter(x=>x.id!=id);saveStore(st);cUsers();}
function saveUsr(){const st=getStore();st.usuarios=st.usuarios.map(u=>({...u,nombre:document.getElementById('unm_'+u.id)?.value||u.nombre,user:document.getElementById('uus_'+u.id)?.value||u.user,pass:document.getElementById('ups_'+u.id)?.value||u.pass,rol:document.getElementById('url_'+u.id)?.value||u.rol}));saveStore(st);alert('✅ Guardado');}

function cSis(){document.getElementById('cfgBody').innerHTML=`<div class="card"><h3>Sistema</h3><div style="display:flex;flex-direction:column;gap:14px;margin-top:10px">
  <div><b style="display:block;margin-bottom:6px">Exportar datos</b><button class="btn btn-secondary" onclick="exportar()">📥 Exportar JSON</button></div>
  <div><b style="display:block;margin-bottom:6px">Importar datos</b><input type="file" id="importFile" accept=".json" onchange="importar(event)"></div>
  <div style="border-top:1px solid #eee;padding-top:12px">
    <b style="display:block;margin-bottom:4px;color:#b00020">Reiniciar datos operativos</b>
    <p style="font-size:12px;color:#888;margin-bottom:8px">Borra todos los cobros, ventas, inscripciones, gastos y pagos de nómina. Conserva barberos, servicios, productos, cursos y usuarios.</p>
    <button class="btn btn-danger btn-sm" onclick="resetOperativo()">🔄 Reiniciar a cero (conservar configuración)</button>
  </div>
  <div style="border-top:1px solid #eee;padding-top:12px">
    <b style="display:block;margin-bottom:4px;color:#b00020">Borrar TODO</b>
    <p style="font-size:12px;color:#888;margin-bottom:8px">Elimina absolutamente todos los datos incluyendo configuración.</p>
    <button class="btn btn-danger btn-sm" onclick="borrar()">🗑 Borrar todos los datos</button>
  </div>
</div></div>`;}

function resetOperativo(){
  if(!confirm('¿Reiniciar datos operativos a cero?\n\nSe borrarán:\n• Cobros de barbería\n• Ventas de productos\n• Inscripciones academia\n• Gastos\n• Pagos de nómina\n\nSe conservará:\n• Barberos, servicios, productos, cursos, usuarios\n\n¡Esta acción no se puede deshacer!'))return;
  const st=getStore();
  st.ingresosBarberia=[];
  st.ingresosProductos=[];
  st.ingresosAcademia=[];
  st.ingresosNevera=[];
  st.gastos=[];
  st.pagosNomina=[];
  saveStore(st);
  alert('✅ Datos operativos reiniciados. La configuración se conservó.');
  showTab('dashboard');
}
function exportar(){const st=getStore();const b=new Blob([JSON.stringify(st,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='allhandmade_'+today()+'.json';a.click();}
function importar(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(confirm('¿Importar? Reemplaza los datos actuales.')){saveStore(d);alert('✅ Importado');showTab('dashboard');}}catch{alert('Archivo inválido');}};r.readAsText(f);}
function borrar(){if(!confirm('¿BORRAR TODO?'))return;localStorage.removeItem('ahm_store');alert('Borrado');showTab('dashboard');}

// ====== MODAL ======
function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
</script>
