<style>
  :root {
    --bg:#f0f0f0; --radius:10px; --shadow:0 2px 12px rgba(0,0,0,.08);
    --card-bg:#fff; --card-border:#e8e8e8;
    --text:#111; --text-muted:#888; --text-sub:#555;
    --header-bg:#111; --nav-bg:#fafafa; --nav-border:#e8e8e8;
    --input-bg:#fff; --input-border:#ddd;
    --transition: .22s cubic-bezier(.4,0,.2,1);
  }
  body.dark {
    --bg:#111; --card-bg:#1c1c1c; --card-border:#2a2a2a;
    --text:#f0f0f0; --text-muted:#666; --text-sub:#999;
    --header-bg:#0a0a0a; --nav-bg:#161616; --nav-border:#2a2a2a;
    --input-bg:#222; --input-border:#333; --shadow:0 2px 12px rgba(0,0,0,.4);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Outfit',system-ui,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px;
    transition: background var(--transition), color var(--transition);
  }

  /* ── TAB TRANSITION ── */
  @keyframes tabFadeIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .content > * { animation: tabFadeIn .28s cubic-bezier(.4,0,.2,1) both; }
  .tab-enter { animation: tabFadeIn .28s cubic-bezier(.4,0,.2,1) both; }

  /* ── CARDS ── */
  @keyframes countUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  /* ── LOGIN ── */
  #loginScreen {
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; background:#fff;
    overflow:hidden; position:relative;
  }
  #loginScreen::before { display:none; }
  .login-wrap {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; width:100%; padding:32px 24px; gap:0;
  }
  .login-logo-container {
    display:flex; flex-direction:column; align-items:center;
    flex:1; justify-content:center; width:100%;
  }
  .login-logo {
    width:min(95vw, 680px); height:500px; object-fit:cover;
    filter: invert(1);
    animation: logoFloat 4s ease-in-out infinite;
    margin: 0 auto;
    display:block;
    border:none;
    max-width:600px;
  }
  @keyframes logoFloat {
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
  }
  .login-tagline {
    color:#bbb; font-size:10px; letter-spacing:5px; text-transform:uppercase;
    font-weight:700; margin-top:12px; text-align:center;
  }
  .login-box {
    background:#fff; border:1.5px solid #e8e8e8;
    border-radius:16px; padding:32px 28px; width:100%; max-width:380px;
    box-shadow:0 8px 40px rgba(0,0,0,.08);
  }
  .login-box .field-label {
    display:block; font-size:11px; font-weight:700; color:#bbb;
    letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px;
  }
  .login-field-wrap { position:relative; margin-bottom:14px; }
  .login-field-wrap .field-icon {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:#ccc; font-size:16px; pointer-events:none;
  }
  .login-box input {
    width:100%; padding:13px 14px 13px 42px;
    background:#f7f7f7; border:1.5px solid #e8e8e8;
    border-radius:10px; font-size:14px; color:#111; outline:none;
    transition: border-color .2s, background .2s;
  }
  .login-box input::placeholder { color:#ccc; }
  .login-box input:focus { border-color:#111; background:#fff; }
  .login-box .login-btn {
    width:100%; padding:14px; margin-top:8px;
    background:rgb(80,24,24); color:#fff; border:none; border-radius:10px;
    font-size:14px; font-weight:800; letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; transition: transform .15s, box-shadow .15s, background .15s;
    box-shadow: 0 4px 20px rgba(80,24,24,.3);
  }
  .login-box .login-btn:hover {
    background:rgb(110,34,34); transform:translateY(-1px); box-shadow:0 8px 28px rgba(80,24,24,.35);
  }
  .login-box .login-btn:active { transform:translateY(0); }
  .login-error { color:#c0001a; font-size:12px; text-align:center; margin-top:12px; display:none; font-weight:600; }
  /* ── MACRO CARDS ── */
  .macro-card {
    background:#111; color:#fff; border-radius:var(--radius);
    padding:24px; margin-bottom:20px;
    background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
    border:1px solid #2a2a2a;
  }
  body.dark .macro-card { background: linear-gradient(135deg, #222 0%, #1a1a1a 100%); border-color:#333; }
  .macro-card h3 { color:#aaa; font-size:11px; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
  .macro-card .big { font-size:36px; font-weight:800; }
  .macro-bd { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .macro-bd .item { background:rgba(255,255,255,.08); border-radius:8px; padding:10px 16px; border:1px solid rgba(255,255,255,.06); }
  .macro-bd .item .lbl { color:#aaa; font-size:11px; }
  .macro-bd .item .val { font-weight:700; font-size:14px; }

  /* ── DARK MODE ADJUSTMENTS ── */
  body.dark table th { background:#222; }
  body.dark td { border-bottom-color:#2a2a2a; }
  body.dark tr:hover td { background:#1f1f1f; }
  body.dark .form-group input,
  body.dark .form-group select { background:var(--input-bg); border-color:var(--input-border); color:var(--text); }
  body.dark .btn-secondary { background:#222; color:#ddd; border-color:#333; }
  body.dark .modal { background:#1c1c1c; color:var(--text); }
  body.dark .modal h2 { border-bottom-color:#333; }
  body.dark .bold-box { background:#1f1f1f; border-color:#333; }
  body.dark .com-box { background:#1a1a1a; border-color:#333; }
  body.dark .sub-tabs button.active { color:#fff; border-bottom-color:#fff; }
  body.dark .readonly-notice { background:#2a2000; border-color:#554400; color:#ffd060; }

  /* ── HEADER / NAV ── */
  /* ── HEADER ── */
  header { background:var(--header-bg); color:#fff; padding:0 20px; height:52px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; border-bottom:1px solid rgba(255,255,255,.08); position:relative; z-index:200; }
  header .brand { font-size:15px; font-weight:700; letter-spacing:2px; display:flex; align-items:center; gap:10px; }
  header .brand img { width:44px; height:44px; object-fit:cover; border-radius:6px; transition: opacity .28s ease; }
  header .header-left { display:flex; align-items:center; gap:14px; }
  header .user-info { display:flex; align-items:center; gap:10px; font-size:12px; color:#aaa; }
  header .user-pill { background:rgba(255,255,255,.1); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:600; color:#fff; }
  header .logout-btn { background:transparent; border:1px solid rgba(255,255,255,.2); color:#aaa; padding:5px 12px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; transition:all .15s; }
  header .logout-btn:hover { background:rgba(255,255,255,.1); color:#fff; }
  .hamburger { background:none; border:none; cursor:pointer; color:#fff; font-size:20px; padding:6px 8px; border-radius:6px; transition:background .15s; line-height:1; display:flex; align-items:center; justify-content:center; }
  .hamburger:hover { background:rgba(255,255,255,.1); }


  #sidebar.open ~ * .brand img,
  #app.sidebar-open .brand img { opacity: 0; }
  .brand img { transition: opacity .28s ease; }
  /* Fade brand when sidebar open */
  .brand-logo-wrap { transition: opacity .28s ease; }
  .brand-logo-wrap.faded { opacity: 0; pointer-events:none; }

  /* ── SIDEBAR ── */
  #app { display:none; flex-direction:column; height:100vh; }
  .app-body { display:flex; flex:1; overflow:hidden; position:relative; }
  #sidebar {
    width:260px; background:var(--header-bg); flex-shrink:0;
    display:flex; flex-direction:column;
    transform:translateX(-100%); position:absolute; top:0; left:0; bottom:0; z-index:100;
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    border-right:1px solid rgba(255,255,255,.08);
    overflow-y:auto; scrollbar-width:none;
  }
  #sidebar::-webkit-scrollbar { display:none; }
  #sidebar.open { transform:translateX(0); box-shadow:4px 0 24px rgba(0,0,0,.3); }
  .sidebar-overlay { display:none; position:absolute; inset:0; background:rgba(0,0,0,.4); z-index:99; backdrop-filter:blur(2px); }
  .sidebar-overlay.visible { display:block; }
  .sidebar-header { padding:20px 20px 12px; border-bottom:1px solid rgba(255,255,255,.08); }
  .sidebar-user { font-size:13px; color:#fff; font-weight:600; }
  .sidebar-role { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
  .sidebar-section { padding:12px 12px 4px; font-size:10px; font-weight:700; color:#444; text-transform:uppercase; letter-spacing:2px; }
  #mainNav { display:flex; flex-direction:column; padding:8px 12px 20px; gap:2px; }
  #mainNav button {
    padding:10px 14px; border:none; background:none; cursor:pointer;
    font-size:13px; font-weight:500; color:#888;
    border-radius:8px; text-align:left; width:100%;
    transition:background .15s, color .15s; font-family:inherit;
    display:flex; align-items:center; gap:10px; white-space:nowrap;
  }
  #mainNav button:hover { background:rgba(255,255,255,.07); color:#ccc; }
  #mainNav button.active { background:rgba(255,255,255,.12); color:#fff; font-weight:700; }

  /* ── CONTENT ── */
  .content { flex:1; overflow-y:auto; padding:24px; }
  .content { flex:1; overflow-y:auto; padding:24px; }
  .card {
    background:var(--card-bg); border-radius:var(--radius); padding:20px;
    box-shadow:var(--shadow); margin-bottom:20px;
    border:1px solid var(--card-border);
    transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
  }
  .card:hover { box-shadow:0 6px 24px rgba(0,0,0,.13); transform:translateY(-1px); transition: transform .18s, box-shadow .18s; }
  .card h3 { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px; }
  .card .big-num { font-size:30px; font-weight:800; animation: countUp .4s .1s both; }
  .card .sub-num { font-size:12px; color:var(--text-muted); margin-top:4px; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:var(--header-bg); color:#fff; padding:9px 12px; text-align:left; font-size:12px; letter-spacing:.3px; }
  td { padding:9px 12px; border-bottom:1px solid var(--card-border); vertical-align:middle; color:var(--text); }
  tr:hover td { background:rgba(0,0,0,.025); }
  body.dark tr:hover td { background:rgba(255,255,255,.04); }
  .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-gray { background:#eee; color:#555; }
  .btn { padding:9px 18px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:700; }
  .btn-primary { background:#111; color:#fff; }
  .btn-primary:hover { background:#333; }
  .btn-secondary { background:#eee; color:#111; border:1.5px solid #ccc; }
  .btn-secondary:hover { background:#ddd; }
  .btn-success { background:#2d7a2d; color:#fff; }
  .btn-success:hover { background:#236023; }
  .btn-danger { background:#b00020; color:#fff; }
  .btn-sm { padding:5px 12px; font-size:12px; }
  .btn-icon { background:none; border:none; cursor:pointer; padding:4px 8px; border-radius:4px; font-size:14px; }
  .btn-icon:hover { background:#eee; }
  .form-row { display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .form-group { flex:1; min-width:140px; }
  .form-group label { display:block; font-size:12px; font-weight:700; color:#555; margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
  .form-group input, .form-group select { width:100%; padding:9px 12px; border:1.5px solid var(--input-border); border-radius:6px; font-size:13px; outline:none; background:var(--input-bg); color:var(--text); transition: border-color .15s, background var(--transition); }
  .form-group input:focus, .form-group select:focus { border-color:var(--text); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card-bg); border-radius:12px; padding:28px; width:580px; max-width:96vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.4); border:1px solid var(--card-border); }
  .modal h2 { font-size:18px; font-weight:800; margin-bottom:20px; padding-bottom:12px; border-bottom:2px solid var(--card-border); color:var(--text); }
  .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid #eee; }

let _db=null,_docRef=null,_saveTimer=null;

function _fbInit(){ return false; //

function saveStore(st){
  // Registrar en historial de auditoría
  try{
    const hist=JSON.parse(_ls.get('ahm_hist')||'[]');
    const entry={
      ts:new Date().toLocaleString('es-CO',{timeZone:'America/Bogota'}),
      user:currentUser?currentUser.nombre+' ('+currentUser.rol+')':'Sistema',
      accion:_auditAccion||'Modificación',
      detalle:_auditDetalle||''
    };
    hist.unshift(entry);
    if(hist.length>500)hist.splice(500);
    _ls.set('ahm_hist',JSON.stringify(hist));
  }catch(e){}
  _auditAccion='';_auditDetalle='';
  const json=JSON.stringify(st);
  _ls.set('ahm_store',json);
  return; // Firebase disabled for standalone
  if(_saveTimer)clearTimeout(_saveTimer);
  const el=document.getElementById('syncStatus');
  if(el)el.textContent='⏳';
  _saveTimer=setTimeout(()=>{
    _docRef.set({store:json,ts:Date.now()})
      .then(()=>{if(el){el.textContent='☁';setTimeout(()=>el.textContent='',2000);}})
      .catch(()=>{if(el)el.textContent='⚠';});
  },800);
}
let _auditAccion='',_auditDetalle='';

async function _fbLoad(){
  if(!_fbInit())return;
  try{
    const snap=await _docRef.get();
    if(snap.exists){
      const data=snap.data().store;
      if(data)_ls.set('ahm_store',data);
    }
  }catch(e){console.warn('Firebase load error:',e);}
}

function _fbListen(){
  if(!_fbInit())return;
  _docRef.onSnapshot(snap=>{
    if(!snap.exists)return;
    const remote=snap.data().store;
    if(remote&&remote!==_ls.get('ahm_store')){
      _ls.set('ahm_store',remote);
      const btn=document.querySelector('nav button.active');
      if(btn){
        const id=btn.id.replace('tab_','');
        showTab(id); // Use showTab to clear content first, preventing duplication
      }
    }
  });
}

let currentUser=null;
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;
  const btn=document.querySelector('#loginScreen .login-btn');
  btn.textContent='Conectando...';btn.disabled=true;
  // Intentar cargar Firebase con timeout de 3s; si falla, usar datos locales
  try{ await Promise.race([_fbLoad(), new Promise(r=>setTimeout(r,3000))]); }catch(e){}
  btn.textContent='Ingresar';btn.disabled=false;
  const st=getStore();
  // Fallback admin siempre disponible
  const isAdmin=u==='admin'&&p==='admin123';
  const found=isAdmin
    ?{id:0,user:'admin',pass:'admin123',rol:'admin',nombre:'Administrador',empleadoId:0}
    :st.usuarios.find(x=>x.user===u&&x.pass===p);
  if(!found){document.getElementById('loginError').style.display='block';return;}
  currentUser=found;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  const hu=document.getElementById('headerUser'); if(hu) hu.textContent=found.nombre+' ('+found.rol+')';
  const su=document.getElementById('sidebarUser'); if(su) su.textContent=found.nombre;
  const sr=document.getElementById('sidebarRole'); if(sr) sr.textContent=found.rol;
  buildNav();showTab('dashboard');
  _fbListen(); // escucha cambios de otros dispositivos en tiempo real
}

let _tabTimer=null;
function showTab(id){
  closeSidebar();
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tab_'+id);if(btn)btn.classList.add('active');
  const content=document.getElementById('mainContent');
  if(_tabTimer){clearTimeout(_tabTimer);_tabTimer=null;}
  content.style.opacity='0';content.style.transform='translateY(8px)';
  content.style.transition='none';
  _tabTimer=setTimeout(()=>{
    _tabTimer=null;
    content.innerHTML='';
    content.style.transition='opacity .22s ease, transform .22s ease';
    content.style.opacity='1';content.style.transform='translateY(0)';
    ({dashboard:renderDashboard,barberia:renderBarberia,productos:renderProductos,academia:renderAcademia,nevera:renderNevera,macro:renderMacro,nomina:renderNomina,gastos:renderGastos,movimientos:renderMovimientos,marcel:renderMarcel,anual:renderAnual,config:renderConfig}[id]||renderDashboard)();
  },80);
}

function calcBold(monto,tipo){
  const t={nacional_debito:{pct:.0219,fijo:300},nacional_otras:{pct:.0329,fijo:300},nacional_credito:{pct:.0369,fijo:300},internacional:{pct:.0429,fijo:300}}[tipo]||{pct:.0329,fijo:300};
  const comBold=Math.round(monto*t.pct+t.fijo),reteICA=Math.round(monto*.00414);
  return{comBold,reteICA,neto:monto-comBold-reteICA,pct:t.pct};
}

function _renderKpiCharts(){
  if(!window._kpiData)return;
  const d=window._kpiData;
  function doRender(){
    const c2=document.getElementById('kpiChart2');
    if(!c2)return;
    if(c2._chart){c2._chart.destroy();}
    const cols=d.cols;
    const colsA=cols.map(c=>c+'33');
    c2._chart=new Chart(c2,{type:'bar',data:{labels:d.labels,datasets:[
      {label:'Cobrado a clientes',data:d.cobrado,backgroundColor:colsA,borderColor:cols,borderWidth:2,borderRadius:4},
      {label:'Produce para barbería',data:d.producido,backgroundColor:cols,borderRadius:4}
    ]},options:{responsive:true,indexAxis:'y',plugins:{legend:{position:'bottom',labels:{font:{size:12}}}},scales:{x:{beginAtZero:true,ticks:{callback:v=>'$'+(v>=1000?(v/1000).toFixed(0)+'k':v)}}}}});
  }
  if(typeof Chart!=='undefined'){
    doRender();
  } else {
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
    sc.onload=doRender;
    document.head.appendChild(sc);
  }
}

let fBarb={fechaD:'',fechaH:'',barbero:'',metodo:''};
function renderBarberia(){

  // aplicar filtros
  let lista=[...base];
  if(fBarb.fechaD)lista=lista.filter(x=>x.fecha>=fBarb.fechaD);
  if(fBarb.fechaH)lista=lista.filter(x=>x.fecha<=fBarb.fechaH);
  if(fBarb.barbero)lista=lista.filter(x=>x.barberoId==fBarb.barbero);
  if(fBarb.metodo)lista=lista.filter(x=>normMetodo(x.metodoPago)===fBarb.metodo);
  lista=lista.sort((a,b)=>(b.fecha+(b.hora||'00:00')).localeCompare(a.fecha+(a.hora||'00:00')));
  const total=lista.reduce((a,x)=>a+(x.neto||x.monto),0);
  const totalMonto=lista.reduce((a,x)=>a+x.monto,0);
  const totalCom=lista.reduce((a,x)=>a+(x.comisionBarbero||0),0);
  const hayFiltro=fBarb.fechaD||fBarb.fechaH||fBarb.barbero||fBarb.metodo;

      <button class="btn btn-secondary btn-sm" onclick="exportarExcelBarberia()" style="background:#1d6f42;color:#fff;border:none">📊 Excel</button>

      <div><label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Hasta</label>

      ${esAdmin?`<div><label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Barbero</label>

    </div>
  </div>

  <div class="grid-3" style="margin-bottom:16px">
    <div class="card mod-b"><h3>Neto${hayFiltro?' (filtrado)':' mes'}</h3><div class="big-num">${fmt(total)}</div><div class="sub-num">Cobrado: ${fmt(totalMonto)}</div></div>
    <div class="card"><h3>Servicios</h3><div class="big-num">${lista.length}</div><div class="sub-num">Prom: ${fmt(lista.length?total/lista.length:0)}</div></div>

  </div>

  <div class="card">
    ${esAdmin?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;justify-content:flex-end">
      <span id="sel_count_b" style="font-size:12px;color:#888"></span>
      <button class="btn btn-danger btn-sm" id="btn_del_sel_b" style="display:none" onclick="eliminarSelB()">🗑 Eliminar seleccionados</button>
      <button class="btn btn-danger btn-sm" onclick="eliminarTodosB()" style="background:#fff;color:#b00020;border:1.5px solid #b00020">🗑 Eliminar todos</button>

    <div style="overflow-x:auto">
    <table style="min-width:750px">
      <thead><tr>${esAdmin?'<th style="width:36px"></th>':''}<th>Fecha</th><th>Hora</th><th>Barbero</th><th>Servicio</th><th>Método</th><th>Cobrado</th><th>Desc.Bold</th><th>Neto</th><th>% Barbero</th><th>Gana barbero</th><th>💸 Propina</th><th>Queda barbería</th>${esAdmin?'<th></th>':''}</tr></thead>
      <tbody>${lista.map(x=>{
        const b=st.barberos.find(b=>b.id==x.barberoId);
        const esBarbB=!x.barberoId||x.barberoId===0;
        const neto=x.neto||x.monto;
        const pct=esBarbB?0:(x.pctAplicado||(b?.pctServicio||40));

        const propina=x.propina||0;
        const quedaBarb=neto-ganaBarbero;
        return`<tr id="row_b_${x.id}">
        ${esAdmin?`<td><input type="checkbox" class="chk_b" data-id="${x.id}" onchange="updSelCountB()" style="width:15px;height:15px;cursor:pointer"></td>`:''}
        <td>${x.fecha}</td><td style="font-size:12px;color:#888">${x.hora||'—'}</td><td>${esBarbB?'🏠 Barbería':b?.nombre||'N/A'}</td><td>${x.descripcion}</td>
        <td><span class="badge badge-gray">${x.metodoPago}</span></td>

        <td><span style="background:${esBarbB?'#e0f0ff':'#f0f0f0'};padding:2px 8px;border-radius:12px;font-size:12px;font-weight:700;color:${esBarbB?'#1a5cb0':'inherit'}">${esBarbB?'100%':pct+'%'}</span></td>

        ${esAdmin?`<td style="white-space:nowrap"><button class="btn-icon" title="Editar" onclick="editarCobroB(${x.id})">✏️</button><button class="btn-icon" onclick="deleteReg('barberia',${x.id})">🗑</button></td>`:''}
      </tr>`;}).join('')||`<tr><td colspan="${esAdmin?13:11}" style="text-align:center;color:#aaa;padding:20px">Sin registros con los filtros aplicados</td></tr>`}
      </tbody>
      ${lista.length>0?`<tfoot><tr style="background:#f5f5f5;font-weight:800">
        ${esAdmin?'<td></td>':''}
        <td colspan="4">TOTAL</td>
        <td>${fmt(totalMonto)}</td>
        <td style="color:#b00020">-${fmt(lista.reduce((a,x)=>a+(x.descuentoBold||0),0))}</td>
        <td>${fmt(total)}</td>
        <td></td>
        <td style="color:#2d7a2d">${fmt(totalCom)}</td>
        <td style="color:#b8860b">${fmt(lista.reduce((a,x)=>a+(x.propina||0),0))}</td>
        <td style="color:#1a5cb0">${fmt(total-totalCom)}</td>
        ${esAdmin?'<td></td>':''}
      </tr></tfoot>`:''}
    </table>
    </div>
  </div>`;
}

function selTodosB(checked){
  document.querySelectorAll('.chk_b').forEach(c=>c.checked=checked);
  updSelCountB();
}
function updSelCountB(){
  const sel=document.querySelectorAll('.chk_b:checked');
  const btn=document.getElementById('btn_del_sel_b');
  const cnt=document.getElementById('sel_count_b');
  if(btn) btn.style.display=sel.length?'':'none';
  if(cnt) cnt.textContent=sel.length?sel.length+' seleccionado'+(sel.length!==1?'s':''):'';
  // highlight rows
  document.querySelectorAll('.chk_b').forEach(c=>{
    const row=document.getElementById('row_b_'+c.dataset.id);
    if(row) row.style.background=c.checked?'#fff8e1':'';
  });
}
function eliminarSelB(){
  const sel=[...document.querySelectorAll('.chk_b:checked')].map(c=>c.dataset.id);
  if(!sel.length)return;
  if(!confirm('¿Eliminar '+sel.length+' cobro'+(sel.length!==1?'s':'')+' seleccionado'+(sel.length!==1?'s':''+'?')))return;
  const st=getStore();
  st.ingresosBarberia=st.ingresosBarberia.filter(x=>!sel.includes(String(x.id)));
  saveStore(st);renderBarberia();
}
function eliminarTodosB(){
  const st=getStore();
  // Respeta los filtros activos — solo borra lo que está visible
  let ids=st.ingresosBarberia;
  if(fBarb.fechaD)ids=ids.filter(x=>x.fecha>=fBarb.fechaD);
  if(fBarb.fechaH)ids=ids.filter(x=>x.fecha<=fBarb.fechaH);
  if(fBarb.barbero)ids=ids.filter(x=>x.barberoId==fBarb.barbero);
  if(fBarb.metodo)ids=ids.filter(x=>normMetodo(x.metodoPago)===fBarb.metodo);
  const n=ids.length;
  if(!n){alert('No hay registros para eliminar.');return;}
  const hayFiltro=fBarb.fechaD||fBarb.fechaH||fBarb.barbero||fBarb.metodo;
  const msg=hayFiltro?'¿Eliminar los '+n+' cobros del filtro actual?':'¿Eliminar TODOS los '+n+' cobros de barbería?\n\nEsta acción no se puede deshacer.';
  if(!confirm(msg))return;
  const idsSet=new Set(ids.map(x=>x.id));
  st.ingresosBarberia=st.ingresosBarberia.filter(x=>!idsSet.has(x.id));
  saveStore(st);renderBarberia();
}

function autoEditPB(){
  const s=document.getElementById('eb_s');
  const p=s.options[s.selectedIndex].dataset.p;
  if(p&&parseInt(p)>0) document.getElementById('eb_m').value=p;
  // Mostrar/ocultar selector ondulador
  const nombre=s.options[s.selectedIndex].text;
  const wrap=document.getElementById('eb_ondulado_wrap');
  if(wrap) wrap.style.display=_esOndulado(nombre)?'':'none';
  updEditB();
}

function updEditB(){
  const monto=parseInt(document.getElementById('eb_m')?.value||0);
  const pago=document.getElementById('eb_p')?.value||'';
  const bId=document.getElementById('eb_b')?.value;
  const propina=parseInt(document.getElementById('eb_prop')?.value||0);
  const st=getStore(),b=st.barberos.find(x=>x.id==bId);
  const wrap=document.getElementById('eb_pct2_wrap'),sel2=document.getElementById('eb_pct2');
  if(wrap&&sel2&&b){
    if(b.pctServicio2>0){wrap.style.display='';sel2.innerHTML=`<option value="${b.pctServicio}">% A — ${b.pctServicio}%</option><option value="${b.pctServicio2}">% B — ${b.pctServicio2}%</option>`;}
    else wrap.style.display='none';
  }
  const pct=sel2&&b?.pctServicio2>0?parseInt(sel2.value||b.pctServicio):b?.pctServicio||40;
  const div=document.getElementById('eb_desglose');if(!div)return;
  let neto=monto,descuentoBold=0,boldHTML='';
  if(pago.startsWith('Bold_')){
    const r=calcBold(monto,pago.replace('Bold_',''));
    neto=r.neto;descuentoBold=r.comBold+r.reteICA;

function guardarEdicionB(id){
  const st=getStore();
  const idx=st.ingresosBarberia.findIndex(x=>x.id==id);
  if(idx<0)return;
  const fecha=document.getElementById('eb_f').value;
  const barberoId=parseInt(document.getElementById('eb_b').value);
  const sSel=document.getElementById('eb_s');
  const descripcion=sSel.options[sSel.selectedIndex].value==='0'
    ? st.ingresosBarberia[idx].descripcion
    : sSel.options[sSel.selectedIndex].text.split(' — ')[0];
  const monto=parseInt(document.getElementById('eb_m').value||0);
  const pago=document.getElementById('eb_p').value;
  const nuevaPropina=parseInt(document.getElementById('eb_prop').value||0);
  if(!fecha||!monto){alert('Completa los campos requeridos');return;}
  const b=st.barberos.find(x=>x.id==barberoId);
  const sel2=document.getElementById('eb_pct2');
  const pct=sel2&&b?.pctServicio2>0?parseInt(sel2.value||b.pctServicio):b?.pctServicio||40;
  let neto=monto,descuentoBold=0,metodoPago=pago;
  if(pago.startsWith('Bold_')){const r=calcBold(monto,pago.replace('Bold_',''));neto=r.neto;descuentoBold=r.comBold+r.reteICA;metodoPago='Tarjeta '+pago.replace('Bold_','');}
  const comisionBarbero=Math.round(monto*pct/100);
  // Manejar cambio de categoría Marcel si es ondulado
  const ondWrap=document.getElementById('eb_ondulado_wrap');
  const esOndEdit=ondWrap&&ondWrap.style.display!=='none';
  if(esOndEdit){
    if(!st.marcelStock) st.marcelStock={normal:0,dificil:0,maltratado:0};
    if(!st.marcelUsos) st.marcelUsos=[];
    const nuevaCat=document.getElementById('eb_ondcat')?.value||'normal';
    const catAnterior=st.ingresosBarberia[idx].marcelCat;
    // Si cambió la categoría, devolver el stock anterior y descontar el nuevo
    if(catAnterior&&catAnterior!==nuevaCat){
      st.marcelStock[catAnterior]=(st.marcelStock[catAnterior]||0)+MF_USO;
      st.marcelStock[nuevaCat]=Math.max(0,(st.marcelStock[nuevaCat]||0)-MF_USO);
      // Actualizar el uso en historial
      const usoIdx=st.marcelUsos.findIndex(u=>u.id==id+1||u.nota&&u.nota.includes(st.ingresosBarberia[idx].descripcion)&&u.fecha===st.ingresosBarberia[idx].fecha);
      if(usoIdx>=0) st.marcelUsos[usoIdx].cat=nuevaCat;
    } else if(!catAnterior){
      // Primera vez que se asigna categoría al editar
      st.marcelStock[nuevaCat]=Math.max(0,(st.marcelStock[nuevaCat]||0)-MF_USO);
      st.marcelUsos.push({id:Date.now(),fecha,cat:nuevaCat,cantidad:1,ml:MF_USO,nota:'Edit — '+descripcion});
    }
    st.ingresosBarberia[idx]={...st.ingresosBarberia[idx],fecha,barberoId,descripcion,monto,neto,descuentoBold,metodoPago,comisionBarbero,pctAplicado:pct,propina:nuevaPropina,marcelCat:nuevaCat};
  } else {
    st.ingresosBarberia[idx]={...st.ingresosBarberia[idx],fecha,barberoId,descripcion,monto,neto,descuentoBold,metodoPago,comisionBarbero,pctAplicado:pct,propina:nuevaPropina};
  }
  _auditAccion="✏️ Cobro editado";_auditDetalle="Barbería - "+fecha+" - "+fmt(monto);
  saveStore(st);closeModal();renderBarberia();
}

function _esOndulado(nombre){return nombre&&nombre.toLowerCase().includes('ondulado');}
function autoPB(){
  const s=document.getElementById('mb_s');
  document.getElementById('mb_p').value=s.options[s.selectedIndex].dataset.p;
  // Mostrar selector de ondulador si el servicio es ondulado
  const nombre=s.options[s.selectedIndex].text;
  const wrap=document.getElementById('mb_ondulado_wrap');
  if(wrap) wrap.style.display=_esOndulado(nombre)?'':'none';
  updB();
}
function updB(){
  const m=parseInt(document.getElementById('mb_p')?.value||0),pago=document.getElementById('mb_m')?.value||'',bId=document.getElementById('mb_b')?.value;

    ${propina>0?`<div class="crow" style="border-top:1.5px solid #f0c040;margin-top:6px;padding-top:6px"><span>💸 Propina → ${b?.nombre||'Barbero'} (100%)</span><span style="color:#b8860b;font-weight:800">${fmt(propina)}</span></div>`:''}

function guardarBarberia(){
  try{
  const st=getStore();
  const fecha=document.getElementById('mb_f').value,barberoId=parseInt(document.getElementById('mb_b').value)||0;
  const esBarberia=document.getElementById('mb_b').value==='0';
  const sS=document.getElementById('mb_s'),servId=parseInt(sS.value),monto=parseInt(document.getElementById('mb_p').value||0),pago=document.getElementById('mb_m').value;
  const propina=parseInt(document.getElementById('mb_prop')?.value||0);
  if(!fecha||!monto){alert('Completa los campos');return;}
  const b=esBarberia?null:st.barberos.find(x=>x.id==barberoId),serv=st.servicios.find(x=>x.id==servId);
  const sel2=document.getElementById('mb_pct2');
  const pctUsar=esBarberia?0:(sel2&&b?.pctServicio2>0?parseInt(sel2.value||b.pctServicio):b?.pctServicio||40);
  let neto=monto,descuentoBold=0,metodoPago=pago;
  if(pago.startsWith('Bold_')){const r=calcBold(monto,pago.replace('Bold_',''));neto=r.neto;descuentoBold=r.comBold+r.reteICA;metodoPago='Tarjeta '+pago.replace('Bold_','');}
  const comisionBarbero=esBarberia?0:Math.round(monto*pctUsar/100);
  const cobId=Date.now();
  const hora=nowTime();
  st.ingresosBarberia.push({id:cobId,fecha,hora,barberoId,descripcion:serv?.nombre||'Servicio',monto,neto,descuentoBold,metodoPago,comisionBarbero,pctAplicado:pctUsar,propina:propina||0});
  // Descontar stock Marcel si es ondulado
  const ondWrap=document.getElementById('mb_ondulado_wrap');
  if(ondWrap&&ondWrap.style.display!=='none'){
    const cat=document.getElementById('mb_ondcat')?.value||'normal';
    if(!st.marcelStock) st.marcelStock={normal:0,dificil:0,maltratado:0};
    if(!st.marcelUsos) st.marcelUsos=[];
    const mlDescontar=MF_USO;
    st.marcelStock[cat]=Math.max(0,(st.marcelStock[cat]||0)-mlDescontar);
    st.marcelUsos.push({id:cobId+1,fecha,cat,cantidad:1,ml:mlDescontar,nota:'Auto — '+( serv?.nombre||'Ondulado')+' ('+barberosPers(st).find(b=>b.id==barberoId)?.nombre||''+')'});
  }
  _auditAccion="✂ Cobro registrado";_auditDetalle="Barbería - "+fecha+" - "+fmt(monto);
  saveStore(st);closeModal();renderBarberia();
  }catch(err){alert('Error al guardar: '+err.message);console.error(err);}
}

// ====== EXPORTAR EXCEL (SheetJS) ======
function _loadSheetJS(cb){
  if(window.XLSX){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb;document.head.appendChild(s);
}

function _exportXLSX(titulo, encabezados, filas, totales, nombreArchivo){
  _loadSheetJS(()=>{
    const wb=XLSX.utils.book_new();
    // Construir datos: titulo, vacío, encabezados, filas, vacío, totales
    const data=[];
    data.push([titulo]);
    data.push([]);
    data.push(encabezados);
    filas.forEach(f=>data.push(f));
    if(totales){data.push([]);data.push(totales);}

    const ws=XLSX.utils.aoa_to_sheet(data);

    // Ancho automático de columnas
    const cols=encabezados.map((_,i)=>{
      const maxLen=Math.max(
        encabezados[i].length,
        ...filas.map(r=>String(r[i]||'').length),
        totales?String(totales[i]||'').length:0
      );
      return {wch:Math.min(Math.max(maxLen+2,10),35)};
    });
    ws['!cols']=cols;

    // Estilo fila título (fila 1)
    const titleCell=ws['A1'];
    if(titleCell) titleCell.s={font:{bold:true,sz:14,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'111111'}},alignment:{horizontal:'left'}};

    // Estilo encabezados (fila 3)
    const hRow=2; // 0-indexed
    encabezados.forEach((_,c)=>{
      const ref=XLSX.utils.encode_cell({r:hRow,c});
      const cell=ws[ref];
      if(cell) cell.s={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1F3864'}},alignment:{horizontal:'center',wrapText:true}};
    });

    // Estilo fila totales (última fila)
    if(totales){
      const tRow=data.length-1;
      totales.forEach((_,c)=>{
        const ref=XLSX.utils.encode_cell({r:tRow,c});
        const cell=ws[ref];
        if(cell) cell.s={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'2d7a2d'}},alignment:{horizontal:'right'}};
      });
    }

    // Formato número para columnas de montos (desde fila 4 en adelante)
    const numFmt='#,##0';
    filas.forEach((fila,fi)=>{
      fila.forEach((val,c)=>{
        if(typeof val==='number'&&val>100){
          const ref=XLSX.utils.encode_cell({r:3+fi,c});
          const cell=ws[ref];
          if(cell){cell.t='n';cell.z=numFmt;}
        }
      });
    });

    XLSX.utils.book_append_sheet(wb,ws,titulo.split(' ')[0]);
    XLSX.writeFile(wb,nombreArchivo+'.xlsx');
  });
}

function exportarExcelBarberia(){
  const st=getStore(),mes=modMes;

  if(fBarb.metodo)lista=lista.filter(x=>normMetodo(x.metodoPago)===fBarb.metodo);
  lista=lista.sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const enc=['Fecha','Barbero','Servicio','Método de Pago','Cobrado ($)','Desc. Bold ($)','Neto ($)','% Comisión','Gana Barbero ($)','Queda Barbería ($)','Propina ($)'];
  const filas=lista.map(x=>{
    const b=st.barberos.find(b=>b.id==x.barberoId);
    const neto=x.neto||x.monto;
    const pct=x.pctAplicado||(b?.pctServicio||40);
    const gana=x.comisionBarbero||0;
    return[x.fecha,b?.nombre||'N/A',x.descripcion,x.metodoPago,x.monto,x.descuentoBold||0,neto,pct+'%',gana,neto-gana,x.propina||0];
  });
  const tot=['TOTAL','','','',
    lista.reduce((a,x)=>a+x.monto,0),
    lista.reduce((a,x)=>a+(x.descuentoBold||0),0),
    lista.reduce((a,x)=>a+(x.neto||x.monto),0),'',
    lista.reduce((a,x)=>a+(x.comisionBarbero||0),0),
    lista.reduce((a,x)=>a+(x.neto||x.monto)-(x.comisionBarbero||0),0),
    lista.reduce((a,x)=>a+(x.propina||0),0)
  ];
  _exportXLSX('Barbería '+mes,enc,filas,tot,'AllHandMade_Barberia_'+mes);

  let lista=esAdmin?st.ingresosAcademia.filter(x=>x.fecha.startsWith(mes)):st.ingresosAcademia.filter(x=>x.fecha.startsWith(mes)&&x.instructorId==currentUser.empleadoId);
  lista=lista.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tInscrito=lista.reduce((a,x)=>a+x.precio,0),tPagado=lista.reduce((a,x)=>a+(x.totalPagado||0),0);
  document.getElementById('mainContent').innerHTML=`
  ${mesPickerHTML('renderAcademia')}
  <div class="section-header">
    <div><h2>🎓 Academia</h2></div>
    ${esAdmin?`<button class="btn btn-primary" onclick="openModalAcademia()">+ Nueva Inscripción</button>`:''}
  </div>
  ${!esAdmin?'<div class="readonly-notice">👁 Solo lectura</div>':''}
  <div class="grid-4" style="margin-bottom:20px">
    <div class="card mod-a"><h3>Total inscrito</h3><div class="big-num">${fmt(tInscrito)}</div></div>
    <div class="card"><h3>Total cobrado</h3><div class="big-num" style="color:#2d7a2d">${fmt(tPagado)}</div></div>
    <div class="card"><h3>Por cobrar</h3><div class="big-num" style="color:#b00020">${fmt(tInscrito-tPagado)}</div></div>
    <div class="card"><h3>Inscripciones</h3><div class="big-num">${lista.length}</div></div>
  </div>
  <div class="card">
    <table><thead><tr><th>Fecha</th><th>Instructor</th><th>Curso</th><th>Estudiante</th><th>Precio</th><th>Pagado</th><th>Pendiente</th><th>Com.Inst.</th><th>Estado</th>${esAdmin?'<th></th>':''}</tr></thead>
    <tbody>${lista.map(x=>{
      const inst=st.instructores.find(i=>i.id==x.instructorId);
      const pend=x.precio-(x.totalPagado||0);
      const estado=pend<=0?'<span class="chip-ok">✓ Pagado</span>':x.totalPagado>0?'<span class="chip-warn">Con abono</span>':'<span class="chip-err">Pendiente</span>';
      const sinComBadge=x.sinComision?'<span style="font-size:10px;background:#e6f4e6;color:#2d7a2d;padding:2px 7px;border-radius:10px;font-weight:700;margin-left:4px">💯 100%</span>':'';
      return`<tr><td>${x.fecha}</td><td>${inst?.nombre||'N/A'}${sinComBadge}</td><td>${x.descripcion}</td><td>${x.estudiante||'—'}</td><td>${fmt(x.precio)}</td><td style="color:#2d7a2d"><b>${fmt(x.totalPagado||0)}</b></td><td style="color:${pend>0?'#b00020':'#2d7a2d'}">${pend>0?fmt(pend):'✓'}</td><td>${x.sinComision?'<span style="color:#2d7a2d;font-size:12px">Sin com.</span>':fmt(x.comisionInstructor||0)}</td><td>${estado}</td>${esAdmin?`<td style="white-space:nowrap">${pend>0?`<button class="btn btn-sm btn-success" onclick="openAbonoA(${x.id})">+Abono</button>`:''} <button class="btn-icon" onclick="deleteReg('academia',${x.id})">🗑</button></td>`:''}`;
    }).join('')||`<tr><td colspan="${esAdmin?10:9}" style="text-align:center;color:#aaa;padding:20px">Sin inscripciones</td></tr>`}
    </tbody></table>
  </div>`;
}

function openModalAcademia(){
  const st=getStore();
  showModal(`<h2>🎓 Nueva Inscripción</h2>

    <div class="form-group"><label>Curso</label><select id="ma_c" onchange="autoPAcad()">${st.cursos.map(c=>`<option value="${c.id}" data-p="${c.precio}" data-cl="${c.clases||1}">${c.nombre} — ${fmt(c.precio)}</option>`).join('')}<option value="0" data-p="0" data-cl="1">Otro</option></select></div>

  </div>

    <div class="form-group"><label>Estudiante</label><input type="text" id="ma_e" placeholder="Opcional"></div>
    <div class="form-group"><label>Abono inicial</label><input type="number" id="ma_ab" placeholder="0 = sin abono" oninput="updA()"></div>
    <div class="form-group"><label>Método abono</label>
    <select id="ma_m"><option value="Efectivo">💵 Efectivo</option><option value="Nequi">📱 Nequi</option><option value="Daviplata">📱 Daviplata</option><option value="Bold">💳 Bold</option></select>

  </div>

      <input type="checkbox" id="ma_sincom" onchange="updA()" style="width:16px;height:16px;cursor:pointer">
      <span>💯 Sin comisión — 100% para la academia</span>

function autoPAcad(){const s=document.getElementById('ma_c');if(!s)return;document.getElementById('ma_p').value=s.options[s.selectedIndex].dataset.p;document.getElementById('ma_cl').value=s.options[s.selectedIndex].dataset.cl||1;updA();}
function updA(){
  const precio=parseInt(document.getElementById('ma_p')?.value||0),clases=parseInt(document.getElementById('ma_cl')?.value||1),abono=parseInt(document.getElementById('ma_ab')?.value||0);
  const sinCom=document.getElementById('ma_sincom')?.checked||false;
  const instId=document.getElementById('ma_i')?.value,st=getStore(),inst=st.instructores.find(x=>x.id==instId);
  const div=document.getElementById('desA');if(!div||!precio)return;
  let com=0,comTxt='Sin comisión';
  if(!sinCom&&inst){
    if(inst.tipoPago==='porClase'){com=inst.valorPorClase*clases;comTxt=`${clases} clases × ${fmt(inst.valorPorClase)}`;}
    else{com=Math.round(precio*inst.pctAcademia/100);comTxt=`${fmt(precio)} × ${inst.pctAcademia}%`;}
  }
  const pend=precio-abono;
  div.innerHTML=`<div class="com-box"><h4>Resumen</h4>
    <div class="crow"><span>Precio total</span><span>${fmt(precio)}</span></div>
    <div class="crow"><span>Abono inicial</span><span style="color:#2d7a2d">${fmt(abono)}</span></div>
    <div class="crow"><span>Saldo pendiente</span><span style="color:${pend>0?'#b00020':'#2d7a2d'}">${pend>0?fmt(pend):'✓ Pagado'}</span></div>
    <div class="crow" style="border-top:1px solid #ccc;margin-top:6px;padding-top:6px">
      <span>Comisión instructor (${comTxt})</span>
      <span style="color:${sinCom?'#2d7a2d':'#b00020'}">${sinCom?'$0':'-'+fmt(com)}</span>
    </div>
    <div class="crow dest"><span>Para la academia</span><span style="color:#2d7a2d">${fmt(precio-com)}</span></div>
  </div>`;
}
function guardarAcademia(){
  const st=getStore();
  const fecha=document.getElementById('ma_f').value,instructorId=parseInt(document.getElementById('ma_i').value);
  const cS=document.getElementById('ma_c'),cursoId=parseInt(cS.value),precio=parseInt(document.getElementById('ma_p').value||0);
  const clases=parseInt(document.getElementById('ma_cl').value||1),estudiante=document.getElementById('ma_e').value;
  const abono=parseInt(document.getElementById('ma_ab').value||0),pago=document.getElementById('ma_m').value;
  const sinCom=document.getElementById('ma_sincom')?.checked||false;
  if(!fecha||!precio){alert('Completa los campos');return;}
  const inst=st.instructores.find(x=>x.id==instructorId),curso=st.cursos.find(x=>x.id==cursoId);
  let comisionInstructor=0;
  if(!sinCom&&inst)comisionInstructor=inst.tipoPago==='porClase'?inst.valorPorClase*clases:Math.round(precio*inst.pctAcademia/100);
  const abonos=abono>0?[{id:Date.now(),fecha,monto:abono,metodoPago:pago}]:[];
  st.ingresosAcademia.push({id:Date.now()+1,fecha,instructorId,descripcion:curso?.nombre||'Curso',estudiante,precio,clases,totalPagado:abono,abonos,comisionInstructor,sinComision:sinCom});
  _auditAccion="🎓 Inscripción registrada";_auditDetalle="Academia - "+fecha+" - "+fmt(precio);
  saveStore(st);closeModal();renderAcademia();
}
function openAbonoA(inscId){
  showModal(`<h2>💰 Registrar Abono</h2>
  <div class="form-row">
    <div class="form-group"><label>Fecha</label><input type="date" id="ab_f" value="${today()}"></div>
    <div class="form-group"><label>Valor</label><input type="number" id="ab_m" placeholder="0"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Método</label><select id="ab_p"><option value="Efectivo">💵 Efectivo</option><option value="Nequi">📱 Nequi</option><option value="Daviplata">📱 Daviplata</option><option value="Bold">💳 Bold</option></select></div>
  </div>
  <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-success" onclick="guardarAbono(${inscId})">Registrar abono</button></div>`);
}
function guardarAbono(inscId){
  const st=getStore(),fecha=document.getElementById('ab_f').value,monto=parseInt(document.getElementById('ab_m').value||0),pago=document.getElementById('ab_p').value;
  if(!monto){alert('Ingresa el valor');return;}
  const idx=st.ingresosAcademia.findIndex(x=>x.id==inscId);if(idx<0)return;
  if(!st.ingresosAcademia[idx].abonos)st.ingresosAcademia[idx].abonos=[];
  st.ingresosAcademia[idx].abonos.push({id:Date.now(),fecha,monto,metodoPago:pago});
  st.ingresosAcademia[idx].totalPagado=(st.ingresosAcademia[idx].totalPagado||0)+monto;
  saveStore(st);closeModal();renderAcademia();
}

function autoPrecioN(){const s=document.getElementById('mn_pr');document.getElementById('mn_p').value=s.options[s.selectedIndex].dataset.p;updN();}
function updN(){
  const pu=parseInt(document.getElementById('mn_p')?.value||0);
  const cant=parseInt(document.getElementById('mn_cant')?.value||1);
  const monto=pu*cant;
  const pago=document.getElementById('mn_m')?.value||'';
  const div=document.getElementById('nev_des');if(!div)return;
  let neto=monto,boldHTML='';
  if(pago.startsWith('Bold_')){
    const r=calcBold(monto,pago.replace('Bold_',''));neto=r.neto;
    boldHTML=`<div class="bold-box"><h4>💳 Bold</h4>
      <div class="brow"><span>Total</span><span>${fmt(monto)}</span></div>
      <div class="brow"><span>Bold+ReteICA</span><span style="color:#b00020">-${fmt(r.comBold+r.reteICA)}</span></div>
      <div class="brow neto"><span>Neto — 100% Nevera</span><span>${fmt(neto)}</span></div></div>`;
  }
  div.innerHTML=boldHTML+(monto?`<div class="com-box" style="margin-top:8px"><h4>Desglose</h4>
    <div class="crow dest"><span>→ Nevera (100%)</span><span style="color:#0ea5e9">${fmt(neto)}</span></div></div>`:'');
}
function guardarNevera(){
  const st=getStore();if(!st.ingresosNevera)st.ingresosNevera=[];
  const fecha=document.getElementById('mn_f').value;
  const vendedorId=parseInt(document.getElementById('mn_v').value);
  const prSel=document.getElementById('mn_pr');
  const descripcion=prSel.options[prSel.selectedIndex].value==='0'?'Producto personalizado':prSel.options[prSel.selectedIndex].text.split(' (')[0];
  const costo=parseInt(prSel.options[prSel.selectedIndex].dataset.c||0);
  const pu=parseInt(document.getElementById('mn_p').value||0);
  const cant=parseInt(document.getElementById('mn_cant').value||1);
  const monto=pu*cant;
  const pago=document.getElementById('mn_m').value;
  if(!fecha||!monto){alert('Completa los campos');return;}
  let neto=monto,descuentoBold=0,metodoPago=pago;

      ${pEmp.length?`<div style="margin-top:10px">
        <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Pagos registrados</div>
        ${pEmp.map(p=>`<div class="abono-item">
          <div><span style="font-weight:700">${p.fecha}</span> · <span class="badge badge-gray">${p.metodoPago}</span>${p.nota?' <span style="color:#888;font-size:11px">('+p.nota+')</span>':''}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="color:#2d7a2d;font-weight:800">${fmt(p.monto)}</span>
            <button class="btn-icon" title="Editar" onclick="editarPagoN(${p.id})">✏️</button>
            <button class="btn-icon" title="Eliminar" onclick="eliminarPagoN(${p.id})">🗑</button>
          </div>
        </div>`).join('')}
        <div class="nomina-row" style="color:#2d7a2d;font-weight:700"><span>Total pagado</span><span>${fmt(pagado)}</span></div>
        ${saldo>0?`<div class="nomina-row" style="color:#b00020;font-weight:700"><span>Saldo por pagar</span><span>${fmt(saldo)}</span></div>`:''}
      </div>`:''}
      ${saldo>0?`<div style="margin-top:12px"><button class="btn btn-success btn-sm" onclick="openPagoN(${a.id},'admin','${a.nombre}',${saldo})">💰 Registrar pago</button></div>`:''}

  html+=`<div class="macro-card" style="margin-top:20px"><h3>RESUMEN NÓMINA ${mes}</h3><div class="big">${fmt(totalDev)}</div><div class="macro-bd"><div class="item"><div class="lbl">Total pagado</div><div class="val">${fmt(totalPagadoMes)}</div></div><div class="item"><div class="lbl">Por pagar</div><div class="val">${fmt(totalDev-totalPagadoMes)}</div></div></div></div>`;

}

function openPagoN(empId,tipo,nombre,saldo){
  showModal(`<h2>💰 Pagar Nómina — ${nombre}</h2>
  <p style="color:#555;margin-bottom:16px">Saldo pendiente: <b style="color:#b00020;font-size:16px">${fmt(saldo)}</b></p>
  <div class="form-row">
    <div class="form-group"><label>Fecha</label><input type="date" id="pn_f" value="${today()}"></div>
    <div class="form-group"><label>Valor a pagar</label><input type="number" id="pn_m" value="${saldo}"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Método</label><select id="pn_p"><option value="Efectivo">💵 Efectivo</option><option value="Bold / Tarjeta">💳 Bold / Tarjeta</option><option value="Nequi">📱 Nequi</option><option value="Daviplata">📱 Daviplata</option></select></div>
    <div class="form-group"><label>Nota (opcional)</label><input type="text" id="pn_n" placeholder="Ej: quincena, adelanto..."></div>
  </div>
  <p style="font-size:12px;color:#888;margin-top:-4px">⚠ Este pago se registrará automáticamente como gasto en la barbería.</p>
  <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-success" onclick="guardarPagoN(${empId},'${tipo}','${nombre.replace(/'/g,"\\'")}')">Registrar pago</button></div>`);
}
function guardarPagoN(empId,tipo,nombre){
  const fecha=document.getElementById('pn_f').value,monto=parseInt(document.getElementById('pn_m').value||0),metodoPago=document.getElementById('pn_p').value,nota=document.getElementById('pn_n').value;
  if(!monto){alert('Ingresa el valor');return;}
  const st=getStore(),mes=fecha.slice(0,7);
  st.pagosNomina.push({id:Date.now(),fecha,mes,empleadoId:empId,tipo,nombre,monto,metodoPago,nota});
  _auditAccion='💰 Pago nómina';_auditDetalle=nombre+' - '+fmt(monto)+' - '+fecha;
  saveStore(st);closeModal();renderNomina();
}

function editarPagoN(pagoId){
  const st=getStore(),p=st.pagosNomina.find(x=>x.id==pagoId);
  if(!p)return;
  showModal(`<h2>✏️ Editar Pago — ${p.nombre}</h2>
  <div class="form-row">
    <div class="form-group"><label>Fecha</label><input type="date" id="ep_f" value="${p.fecha}"></div>
    <div class="form-group"><label>Valor</label><input type="number" id="ep_m" value="${p.monto}"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Método</label>
      <select id="ep_p">
        <option ${p.metodoPago==='Efectivo'?'selected':''} value="Efectivo">💵 Efectivo</option>
        <option ${p.metodoPago==='Bold / Tarjeta'?'selected':''} value="Bold / Tarjeta">💳 Bold / Tarjeta</option>
        <option ${p.metodoPago==='Nequi'?'selected':''} value="Nequi">📱 Nequi</option>
        <option ${p.metodoPago==='Daviplata'?'selected':''} value="Daviplata">📱 Daviplata</option>
      </select>
    </div>
    <div class="form-group"><label>Nota (opcional)</label><input type="text" id="ep_n" value="${p.nota||''}" placeholder="Ej: quincena, adelanto..."></div>
  </div>
  <p style="font-size:12px;color:#888;margin-top:-4px">⚠ El gasto asociado en la barbería también se actualizará.</p>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="guardarEdicionPagoN(${pagoId})">Guardar cambios</button>
  </div>`);
}

function guardarEdicionPagoN(pagoId){
  const fecha=document.getElementById('ep_f').value,monto=parseInt(document.getElementById('ep_m').value||0),metodoPago=document.getElementById('ep_p').value,nota=document.getElementById('ep_n').value;
  if(!monto){alert('Ingresa el valor');return;}
  const st=getStore();
  const idx=st.pagosNomina.findIndex(x=>x.id==pagoId);
  if(idx<0)return;
  const p=st.pagosNomina[idx];
  st.pagosNomina[idx]={...p,fecha,mes:fecha.slice(0,7),monto,metodoPago,nota};
  saveStore(st);closeModal();renderNomina();
}

function eliminarPagoN(pagoId){
  if(!confirm('¿Eliminar este pago?'))return;
  const st=getStore();
  st.pagosNomina=st.pagosNomina.filter(x=>x.id!=pagoId);
  saveStore(st);renderNomina();
}

let fGast={fechaD:'',fechaH:'',bolsillo:'',categoria:'',origen:''};
function renderGastos(){
  const st=getStore(),mes=modMes;
  let lista=st.gastos.filter(x=>x.fecha.startsWith(mes)).sort((a,b)=>b.fecha.localeCompare(a.fecha));

  // Aplicar filtros
  if(fGast.fechaD) lista=lista.filter(x=>x.fecha>=fGast.fechaD);
  if(fGast.fechaH) lista=lista.filter(x=>x.fecha<=fGast.fechaH);
  if(fGast.bolsillo) lista=lista.filter(x=>normMetodo(x.metodoGasto||'')===fGast.bolsillo);
  if(fGast.categoria) lista=lista.filter(x=>x.categoria===fGast.categoria);
  if(fGast.origen){
    if(fGast.origen==='Manual') lista=lista.filter(x=>!x.autoGen&&x.categoria!=='Nómina'&&x.categoria!=='Bold');
    else if(fGast.origen==='Auto-nómina') lista=lista.filter(x=>x.categoria==='Nómina');
    else if(fGast.origen==='Auto-Bold') lista=lista.filter(x=>x.categoria==='Bold');
  }

  const total=lista.reduce((a,x)=>a+x.monto,0);
  const hayFiltro=fGast.fechaD||fGast.fechaH||fGast.bolsillo||fGast.categoria||fGast.origen;

  // Calcular descuentos Bold del mes
  const ibM=st.ingresosBarberia.filter(x=>x.fecha.startsWith(mes));
  const ipM=st.ingresosProductos.filter(x=>x.fecha.startsWith(mes));
  const inM=(st.ingresosNevera||[]).filter(x=>x.fecha.startsWith(mes));
  const boldBarb=ibM.reduce((a,x)=>a+(x.descuentoBold||0),0);
  const boldProd=ipM.reduce((a,x)=>a+(x.descuentoBold||0),0);
  const boldNev=inM.reduce((a,x)=>a+(x.descuentoBold||0),0);
  const totalBold=boldBarb+boldProd+boldNev;

  // Categorías únicas para filtro
  const cats=[...new Set(st.gastos.filter(x=>x.fecha.startsWith(mes)).map(x=>x.categoria))].sort();
  const bolsillos=[...new Set(st.gastos.filter(x=>x.fecha.startsWith(mes)&&x.metodoGasto).map(x=>normMetodo(x.metodoGasto)))].sort();

  // Totales por categoría (sin filtro)
  const porCat={};
  st.gastos.filter(x=>x.fecha.startsWith(mes)).forEach(x=>{porCat[x.categoria]=(porCat[x.categoria]||0)+x.monto;});
  const catOrd=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);

  document.getElementById('mainContent').innerHTML=`
  ${mesPickerHTML('renderGastos')}
  <div class="section-header">
    <div><h2>📋 Gastos</h2>${hayFiltro?'<span style="font-size:11px;font-weight:700;background:#111;color:#fff;border-radius:4px;padding:2px 8px;margin-left:8px">Filtros activos</span>':''}</div>
    <button class="btn btn-primary" onclick="openModalGasto()">+ Registrar Gasto</button>
  </div>

  <!-- FILTROS -->
  <div class="card" style="margin-bottom:16px;padding:14px 18px">
    <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap">
      <div><label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Desde</label>
        <input type="date" id="fg_d" value="${fGast.fechaD}" onchange="fGast.fechaD=this.value;renderGastos()" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px"></div>
      <div><label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Hasta</label>
        <input type="date" id="fg_h" value="${fGast.fechaH}" onchange="fGast.fechaH=this.value;renderGastos()" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px"></div>
      <div><label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Bolsillo</label>
        <select onchange="fGast.bolsillo=this.value;renderGastos()" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px">
          <option value="">Todos</option>
          ${bolsillos.map(b=>`<option value="${b}" ${fGast.bolsillo===b?'selected':''}>${b}</option>`).join('')}
        </select></div>
      <div><label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Categoría</label>
        <select onchange="fGast.categoria=this.value;renderGastos()" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px">
          <option value="">Todas</option>
          ${cats.map(c=>`<option value="${c}" ${fGast.categoria===c?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div><label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Origen</label>
        <select onchange="fGast.origen=this.value;renderGastos()" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px">
          <option value="">Todos</option>
          <option value="Manual" ${fGast.origen==='Manual'?'selected':''}>Manual</option>
          <option value="Auto-nómina" ${fGast.origen==='Auto-nómina'?'selected':''}>Auto-nómina</option>
          <option value="Auto-Bold" ${fGast.origen==='Auto-Bold'?'selected':''}>Auto-Bold</option>
        </select></div>
      ${hayFiltro?`<button onclick="fGast={fechaD:'',fechaH:'',bolsillo:'',categoria:'',origen:''};renderGastos()" class="btn btn-secondary btn-sm" style="align-self:flex-end">✕ Limpiar</button>`:''}
      <div style="margin-left:auto;align-self:flex-end"><span style="font-size:11px;color:#888">${lista.length} registro${lista.length!==1?'s':''}</span></div>
    </div>
  </div>

  <div class="grid-3" style="margin-bottom:20px">
    <div class="card" style="border-left:4px solid #b00020">
      <h3>Gastos${hayFiltro?' (filtrados)':' registrados'}</h3>
      <div class="big-num" style="color:#b00020">${fmt(total)}</div>
      <div class="sub-num">${lista.length} registros</div>
    </div>
    <div class="card" style="border-left:4px solid #555">
      <h3>💳 Descuentos Bold (automático)</h3>
      <div class="big-num" style="color:#555">${fmt(totalBold)}</div>
      <div class="sub-num">Sale directo de los pagos con tarjeta</div>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:140px;background:#fff;border:1px solid #eee;border-radius:8px;padding:12px">
        <div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">✂ Bold en Barbería</div>
        <div style="font-size:20px;font-weight:800;color:#555">${fmt(boldBarb)}</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px">${ibM.filter(x=>x.descuentoBold>0).length} cobros con tarjeta</div>
      </div>
      <div style="flex:1;min-width:140px;background:#fff;border:1px solid #eee;border-radius:8px;padding:12px">
        <div style="font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">🛍 Bold en Productos</div>
        <div style="font-size:20px;font-weight:800;color:#555">${fmt(boldProd)}</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px">${ipM.filter(x=>x.descuentoBold>0).length} ventas con tarjeta</div>
      </div>
      <div style="flex:1;min-width:140px;background:#111;color:#fff;border-radius:8px;padding:12px">
        <div style="font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Total Bold descontado</div>
        <div style="font-size:20px;font-weight:800">${fmt(totalBold)}</div>
        <div style="font-size:11px;color:#aaa;margin-top:2px">Ya incluido en el neto de cada cobro</div>
      </div>
    </div>
  </div>`:''}

  ${catOrd.length?`<div class="card" style="margin-bottom:16px">
    <h3>Por categoría</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${catOrd.map(([cat,v])=>{const pct=total>0?Math.round(v/total*100):0;return`<div style="flex:1;min-width:130px;background:#f5f5f5;border-radius:8px;padding:10px 12px;cursor:pointer" onclick="fGast.categoria='${cat}';renderGastos()"><div style="font-size:11px;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:4px">${cat}</div><div style="font-size:17px;font-weight:800;color:#b00020">${fmt(v)}</div><div style="font-size:11px;color:#aaa">${pct}%</div></div>`;}).join('')}

  </div>`:''}

  <div class="card">
    <table><thead><tr><th>Fecha</th><th>Categoría</th><th>Descripción</th><th>Bolsillo</th><th>Origen</th><th>Monto</th><th></th></tr></thead>

    </div>
    <div class="form-group"><label>Total ML a agregar</label>

  </div>

    <button class="btn btn-primary" onclick="mfGuardarAgregado('${cat}')">Guardar</button>

}

function mfGuardarAgregado(cat){
  const botellas=parseFloat(document.getElementById('mf_bot').value||0);
  if(!botellas||botellas<=0){alert('Ingresa la cantidad');return;}
  const ml=Math.round(botellas*MF_ML);
  const fecha=document.getElementById('mf_fecha').value;
  const nota=document.getElementById('mf_nota').value;
  const st=getMF();
  st.marcelStock[cat]=(st.marcelStock[cat]||0)+ml;
  // Registrar en historial
  if(!st.marcelEntradas) st.marcelEntradas=[];
  st.marcelEntradas.push({id:Date.now(),fecha,cat,ml,botellas,nota,tipo:'entrada'});
  _auditAccion='💈 Stock Marcel agregado';
  _auditDetalle=MF_CATS.find(c=>c.id===cat)?.nombre+' +'+botellas+' bot.';
  saveStore(st);closeModal();renderMarcel();
}

function mfRegistrarUso(cat){
  const catObj=MF_CATS.find(c=>c.id===cat);
  const st=getMF();
  const mlActual=st.marcelStock[cat]||0;
  const maxOndulados=Math.floor(mlActual/MF_USO);
  showModal(`<h2>✂ Registrar uso — ${catObj.nombre}</h2>
  <p style="font-size:13px;color:#888;margin-bottom:4px">Cada ondulado usa <b>media botella (${MF_USO}ml)</b>.</p>
  <p style="font-size:13px;color:${catObj.color};font-weight:700;margin-bottom:16px">Stock actual: ${(mlActual/MF_ML).toFixed(1)} botellas (${mlActual}ml) · Máx. ${maxOndulados} ondulados</p>
  <div class="form-row">
    <div class="form-group"><label>N° de ondulados</label>
      <input type="number" id="mf_cant" value="1" min="1" max="${maxOndulados}" oninput="document.getElementById('mf_uso_prev').textContent=(parseInt(this.value||0)*${MF_USO})+' ml ('+((parseInt(this.value||0)*${MF_USO})/${MF_ML}).toFixed(1)+' bot.)'" style="font-size:18px;font-weight:800;text-align:center">
    </div>
    <div class="form-group"><label>ML a descontar</label>
      <div id="mf_uso_prev" style="font-size:20px;font-weight:800;color:#b00020;padding:10px 0">${MF_USO} ml (0.5 bot.)</div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Fecha</label><input type="date" id="mf_usoFecha" value="${today()}"></div>
    <div class="form-group"><label>Nota (opcional)</label><input type="text" id="mf_usoNota" placeholder="Ej: Cliente Juan"></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="mfGuardarUso('${cat}')">Registrar</button>
  </div>`);
}

function mfGuardarUso(cat){
  const cantidad=parseInt(document.getElementById('mf_cant').value||0);
  if(!cantidad||cantidad<=0){alert('Ingresa la cantidad');return;}
  const ml=cantidad*MF_USO;
  const fecha=document.getElementById('mf_usoFecha').value;
  const nota=document.getElementById('mf_usoNota').value;
  const st=getMF();
  if((st.marcelStock[cat]||0)<ml){alert('Stock insuficiente');return;}
  st.marcelStock[cat]=(st.marcelStock[cat]||0)-ml;
  st.marcelUsos.push({id:Date.now(),fecha,cat,cantidad,ml,nota});
  _auditAccion='💈 Uso Marcel registrado';
  _auditDetalle=MF_CATS.find(c=>c.id===cat)?.nombre+' '+cantidad+' ondulado(s) -'+ml+'ml';
  saveStore(st);closeModal();renderMarcel();
}

function mfEliminarUso(id){
  if(!confirm('¿Eliminar este registro y devolver el stock?'))return;
  const st=getMF();
  const uso=st.marcelUsos.find(u=>u.id==id);
  if(!uso)return;
  st.marcelStock[uso.cat]=(st.marcelStock[uso.cat]||0)+uso.ml;
  st.marcelUsos=st.marcelUsos.filter(u=>u.id!=id);
  saveStore(st);renderMarcel();
}

let fMov={fechaD:'',fechaH:'',tipo:'',metodo:'',barbero:''};
function renderMovimientos(){
  const st=getStore(),mes=modMes;
  const esAdmin=(currentUser.rol==='admin'||currentUser.rol==='administradora');

  // Consolidar todos los ingresos
  let todos=[];

  // Barbería
  st.ingresosBarberia.filter(x=>x.fecha.startsWith(mes)).forEach(x=>{
    const b=st.barberos.find(b=>b.id==x.barberoId);
    const neto=x.neto||x.monto;
    const pct=x.pctAplicado||(b?.pctServicio||40);
    const gana=x.comisionBarbero||Math.round(x.monto*pct/100);
    todos.push({id:x.id,fecha:x.fecha,tipo:'✂ Barbería',persona:b?.nombre||'N/A',personaId:x.barberoId,descripcion:x.descripcion,metodo:x.metodoPago,cobrado:x.monto,descBold:x.descuentoBold||0,neto,comision:gana,queda:neto-gana,propina:x.propina||0,modulo:'barberia'});
    if(x.propina>0) todos.push({id:x.id+'p',fecha:x.fecha,tipo:'💸 Propina',persona:b?.nombre||'N/A',personaId:x.barberoId,descripcion:'Propina — '+x.descripcion,metodo:x.metodoPago,cobrado:x.propina,descBold:0,neto:x.propina,comision:x.propina,queda:0,propina:0,modulo:'propina'});
  });

  // Productos
  st.ingresosProductos.filter(x=>x.fecha.startsWith(mes)).forEach(x=>{
    const b=st.barberos.find(b=>b.id==x.barberoId);
    const neto=x.neto||x.monto;
    const esBarberia=!x.barberoId||x.barberoId===0;
    const gana=esBarberia?0:(x.comisionBarbero||0);
    todos.push({id:x.id,fecha:x.fecha,tipo:'🛍 Producto',persona:esBarberia?'Barbería':b?.nombre||'N/A',personaId:x.barberoId,descripcion:x.descripcion+(x.cantidad>1?' ×'+x.cantidad:''),metodo:x.metodoPago,cobrado:x.monto,descBold:x.descuentoBold||0,neto,comision:gana,queda:neto-gana,propina:0,modulo:'productos'});
  });

  // Academia
  st.ingresosAcademia.filter(x=>x.fecha.startsWith(mes)).forEach(x=>{
    const inst=st.instructores.find(i=>i.id==x.instructorId);
    if(x.abonos&&x.abonos.length){
      x.abonos.forEach(ab=>{
        todos.push({id:ab.id,fecha:ab.fecha,tipo:'🎓 Academia',persona:inst?.nombre||'Sin instructor',personaId:x.instructorId,descripcion:x.descripcion+(x.estudiante?' — '+x.estudiante:''),metodo:ab.metodoPago,cobrado:ab.monto,descBold:0,neto:ab.monto,comision:x.comisionInstructor||0,queda:ab.monto-(x.comisionInstructor||0),propina:0,modulo:'academia'});
      });
    } else if(x.totalPagado>0){
      todos.push({id:x.id,fecha:x.fecha,tipo:'🎓 Academia',persona:inst?.nombre||'Sin instructor',personaId:x.instructorId,descripcion:x.descripcion+(x.estudiante?' — '+x.estudiante:''),metodo:'Efectivo',cobrado:x.totalPagado,descBold:0,neto:x.totalPagado,comision:x.comisionInstructor||0,queda:x.totalPagado-(x.comisionInstructor||0),propina:0,modulo:'academia'});
    }
  });

  // Nevera
  (st.ingresosNevera||[]).filter(x=>x.fecha.startsWith(mes)).forEach(x=>{
    const neto=x.neto||x.monto;

function exportarExcelMovimientos(){
  const st=getStore(),mes=modMes;
  let todos=[];
  st.ingresosBarberia.filter(x=>x.fecha.startsWith(mes)).forEach(x=>{
    const b=st.barberos.find(b=>b.id==x.barberoId);
    const neto=x.neto||x.monto;
    const gana=x.comisionBarbero||Math.round(x.monto*(x.pctAplicado||(b?.pctServicio||40))/100);
    todos.push([x.fecha,'✂ Barbería',b?.nombre||'N/A',x.descripcion,x.metodoPago,x.monto,x.descuentoBold||0,neto,gana,neto-gana,x.propina||0]);
  });
  st.ingresosProductos.filter(x=>x.fecha.startsWith(mes)).forEach(x=>{
    const b=st.barberos.find(b=>b.id==x.barberoId);
    const neto=x.neto||x.monto;
    const esBarberia=!x.barberoId||x.barberoId===0;
    todos.push([x.fecha,'🛍 Producto',esBarberia?'Barbería':b?.nombre||'N/A',x.descripcion+(x.cantidad>1?' ×'+x.cantidad:''),x.metodoPago,x.monto,x.descuentoBold||0,neto,esBarberia?0:x.comisionBarbero||0,neto-(esBarberia?0:x.comisionBarbero||0),0]);
  });
  st.ingresosAcademia.filter(x=>x.fecha.startsWith(mes)).forEach(x=>{
    const inst=st.instructores.find(i=>i.id==x.instructorId);
    const abonos=x.abonos&&x.abonos.length?x.abonos:[{fecha:x.fecha,monto:x.totalPagado||0,metodoPago:'Efectivo'}];
    abonos.forEach(ab=>todos.push([ab.fecha,'🎓 Academia',inst?.nombre||'Sin instructor',x.descripcion+(x.estudiante?' — '+x.estudiante:''),ab.metodoPago,ab.monto,0,ab.monto,x.comisionInstructor||0,ab.monto-(x.comisionInstructor||0),0]));
  });
  (st.ingresosNevera||[]).filter(x=>x.fecha.startsWith(mes)).forEach(x=>{
    const neto=x.neto||x.monto;
    todos.push([x.fecha,'🧊 Nevera','Nevera',x.descripcion+(x.cantidad>1?' ×'+x.cantidad:''),x.metodoPago,x.monto,x.descuentoBold||0,neto,0,neto,0]);
  });
  todos.sort((a,b)=>b[0].localeCompare(a[0]));
  const rows=[['Fecha','Módulo','Persona','Descripción','Método','Cobrado','Desc.Bold','Neto','Comisión','Queda negocio','Propina'],...todos];
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  _csvToExcel(csv,'Movimientos_'+mes);
}

function _charts(dm,etq){
  const lk=(id,html)=>{const el=document.getElementById(id);if(el)el.innerHTML=html;};
  lk("lgMain","<span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#111></span>Total ingresos</span><span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#b00020></span>Gastos</span><span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#2d7a2d></span>Utilidad</span>");
  lk("lgMod","<span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#111></span>Barbería</span><span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#555></span>Productos</span><span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#999></span>Academia</span>");
  lk("lgCom","<span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#111></span>Com.Servicios</span><span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#555></span>Com.Productos</span><span style=display:flex;align-items:center;gap:4px><span style=width:12px;height:12px;border-radius:2px;background:#999></span>Com.Academia</span>");
  const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};
  const fmtK=v=>"$"+Math.round(v/1000)+"k";
  const cm=document.getElementById("chartMain");
  if(cm)new Chart(cm,{type:"bar",data:{labels:etq,datasets:[{label:"Ingresos",data:dm.map(x=>x.tI),backgroundColor:"rgba(17,17,17,.75)",order:2},{label:"Gastos",data:dm.map(x=>x.tG),backgroundColor:"rgba(176,0,32,.6)",order:2},{label:"Utilidad",data:dm.map(x=>x.util),type:"line",borderColor:"#2d7a2d",backgroundColor:"rgba(45,122,45,.1)",fill:true,tension:.35,pointRadius:4,order:1}]},options:{...opts,scales:{x:{ticks:{autoSkip:false,maxRotation:0,font:{size:11}}},y:{ticks:{callback:fmtK}}}}});
  const cmod=document.getElementById("chartMod");
  if(cmod)new Chart(cmod,{type:"bar",data:{labels:etq,datasets:[{label:"Barbería",data:dm.map(x=>x.tB),backgroundColor:"rgba(17,17,17,.8)",stack:"s"},{label:"Productos",data:dm.map(x=>x.tP),backgroundColor:"rgba(85,85,85,.8)",stack:"s"},{label:"Academia",data:dm.map(x=>x.tA),backgroundColor:"rgba(153,153,153,.8)",stack:"s"}]},options:{...opts,scales:{x:{stacked:true,ticks:{autoSkip:false,maxRotation:0,font:{size:11}}},y:{stacked:true,ticks:{callback:fmtK}}}}});
  const ctx=document.getElementById("chartTx");
  if(ctx)new Chart(ctx,{type:"line",data:{labels:etq,datasets:[{label:"Servicios",data:dm.map(x=>x.nServ),borderColor:"#111",backgroundColor:"rgba(17,17,17,.08)",tension:.35,fill:true,pointRadius:4},{label:"Ventas prod.",data:dm.map(x=>x.nVtas),borderColor:"#555",backgroundColor:"rgba(85,85,85,.08)",tension:.35,fill:true,pointRadius:4},{label:"Inscrip.",data:dm.map(x=>x.nInsc),borderColor:"#999",backgroundColor:"rgba(153,153,153,.08)",tension:.35,fill:true,pointRadius:4}]},options:{...opts,plugins:{legend:{display:true,position:"bottom",labels:{boxWidth:12,font:{size:11}}}},scales:{x:{ticks:{autoSkip:false,maxRotation:0,font:{size:11}}},y:{ticks:{stepSize:1}}}}});
  const ccom=document.getElementById("chartCom");
  if(ccom)new Chart(ccom,{type:"bar",data:{labels:etq,datasets:[{label:"Servicios",data:dm.map(x=>x.cB),backgroundColor:"rgba(17,17,17,.8)",stack:"c"},{label:"Productos",data:dm.map(x=>x.cP),backgroundColor:"rgba(85,85,85,.8)",stack:"c"},{label:"Academia",data:dm.map(x=>x.cA),backgroundColor:"rgba(153,153,153,.8)",stack:"c"}]},options:{...opts,scales:{x:{stacked:true,ticks:{autoSkip:false,maxRotation:0,font:{size:11}}},y:{stacked:true,ticks:{callback:fmtK}}}}});

let _histDesbloqueado=false;
function cHistorial(){
  const body=document.getElementById('cfgBody');
  if(!_histDesbloqueado){
    body.innerHTML=`<div class="card" style="max-width:400px;margin:0 auto;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">🔒</div>
      <h3 style="margin-bottom:8px">Historial protegido</h3>

      <input type="password" id="hist_clave" placeholder="Clave de acceso" style="width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:10px;text-align:center">
      <p id="hist_err" style="color:#b00020;font-size:12px;display:none;margin-bottom:8px">Clave incorrecta</p>
      <button class="btn btn-primary" style="width:100%" onclick="verHistorial()">Acceder</button>
    </div>`;
    document.getElementById('hist_clave').addEventListener('keydown',e=>{if(e.key==='Enter')verHistorial();});
    return;
  }
  mostrarHistorial();
}
function verHistorial(){
  const clave=document.getElementById('hist_clave')?.value;
  if(clave===HIST_CLAVE){_histDesbloqueado=true;mostrarHistorial();}
  else{const e=document.getElementById('hist_err');if(e)e.style.display='block';}
}
function mostrarHistorial(filtroMes='',filtroUser=''){
  const hist=JSON.parse(_ls.get('ahm_hist')||'[]');
  let filtrado=hist;
  if(filtroMes) filtrado=filtrado.filter(h=>h.ts&&h.ts.includes(filtroMes.split('-').reverse().join('/')));
  if(filtroUser) filtrado=filtrado.filter(h=>h.user&&h.user.toLowerCase().includes(filtroUser.toLowerCase()));
  const body=document.getElementById('cfgBody');
  // Obtener lista de usuarios únicos
  const usuarios=[...new Set(hist.map(h=>h.user))].filter(Boolean);
  body.innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3>🔍 Historial de cambios (${filtrado.length} / ${hist.length} registros)</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="_histDesbloqueado=false;cHistorial()">🔒 Bloquear</button>
        <button class="btn btn-danger btn-sm" onclick="if(confirm('¿Borrar todo el historial?')){localStorage.removeItem('ahm_hist');mostrarHistorial();}">🗑 Limpiar</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
      <div><label style="font-size:11px;font-weight:700;color:#888;display:block;margin-bottom:4px">FILTRAR POR MES</label>
        <select onchange="mostrarHistorial(this.value,document.getElementById('hist_fuser').value)" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px">
          <option value="">Todos</option>
          ${ALL_MESES.map(m=>`<option value="${m}" ${filtroMes===m?'selected':''}>${MESES_NOM[ALL_MESES.indexOf(m)]} 2026</option>`).join('')}
        </select>
      </div>
      <div><label style="font-size:11px;font-weight:700;color:#888;display:block;margin-bottom:4px">FILTRAR POR USUARIO</label>
        <select id="hist_fuser" onchange="mostrarHistorial(document.querySelector('[onchange*=hist_fuser]')?.value||'',this.value)" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:13px">
          <option value="">Todos</option>
          ${usuarios.map(u=>`<option value="${u}" ${filtroUser===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
    </div>
    ${filtrado.length?`<div style="overflow-x:auto"><table>
      <thead><tr><th>Fecha y hora</th><th>Usuario</th><th>Acción</th><th>Detalle</th></tr></thead>
      <tbody>${filtrado.map(h=>`<tr>
        <td style="white-space:nowrap;font-size:12px;color:#888">${h.ts}</td>
        <td style="font-size:12px;font-weight:700">${h.user}</td>
        <td>${h.accion}</td>
        <td style="font-size:12px;color:#555">${h.detalle||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`:'<div style="text-align:center;color:#aaa;padding:30px">Sin registros para este filtro</div>'}
  </div>`;
}

function delAdm(id){const st=getStore();st.administradoras=st.administradoras.filter(x=>x.id!=id);saveStore(st);cAdm();}
